  <!-- ==========================================================================
       🚨 CRITICAL SECURITY BARRIER: ASYNC INITIALIZATION DOMAIN GUARD & AUTO-LOGOUT
       ========================================================================= -->
    <script>
        (async function enforceStrictAdminProtection() {
            "use strict";

            // 🎯 FIXED: Explicitly loops and polls until the Supabase library is safely loaded into memory
            function waitForSupabaseClientEngine() {
                return new Promise((resolve) => {
                    if (window.authSupabaseClient || window.supabase) {
                        return resolve(window.authSupabaseClient || window.supabase);
                    }
                    const trackingInterval = setInterval(() => {
                        const client = window.authSupabaseClient || window.supabase;
                        if (client) {
                            clearInterval(trackingInterval);
                            resolve(client);
                        }
                    }, 30); // Polls every 30ms to prevent page rendering bypasses
                });
            }

            // 1. Halt execution track until the communication client is verified active
            const client = await waitForSupabaseClientEngine();

            try {
                // 2. Fetch active session parameters directly from encrypted local storage cache
                const { data: { session }, error } = await client.auth.getSession();

                // 🔒 BARRIER A: Kick out immediately if no active token exists or if database returns an error
                if (error || !session || !session.user) {
                    window.location.replace('admin-login.html');
                    return;
                }

                // 🔒 BARRIER B: Wipe session instantly if the email string fails the corporate extension rule
                const staffEmail = session.user.email.toLowerCase();
                if (!staffEmail.endsWith('@filings4u.com')) {
                    console.warn("Security Breach Blocked: Unauthorized account domain profile detected.");
                    await client.auth.signOut();
                    window.location.replace('admin-login.html');
                    return;
                }

                console.log(`🔒 Terminal secure. Staff verification active for: ${staffEmail}`);

                // ==========================================================================
                // ⏱️ AUTOMATIC INACTIVITY LOGOUT ENGINE (15 MINUTE LIFECYCLE BARRIER)
                // ==========================================================================
                let inactivityTimeoutTimer;
                const TIMEOUT_LIMIT_MS = 15 * 60 * 1000; // 15 Minutes

                async function terminateInactiveAdminSession() {
                    console.warn("Inactivity limit exceeded. Destroying temporary administrative tokens...");
                    alert("Administrative Session Expired: For your data protection, you have been automatically logged out due to inactivity.");
                    await client.auth.signOut();
                    window.location.replace('https://filings4u.com');
                }

                function resetInactivityTrackingClock() {
                    clearTimeout(inactivityTimeoutTimer);
                    inactivityTimeoutTimer = setTimeout(terminateInactiveAdminSession, TIMEOUT_LIMIT_MS);
                }

                // Wire up user activity hardware triggers smoothly
                ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(eventType => {
                    document.addEventListener(eventType, resetInactivityTrackingClock, { passive: true });
                });

                resetInactivityTrackingClock();

            } catch (err) {
                console.error("Guard Script Encountered an Exception:", err.message);
                window.location.replace('admin-login.html');
            }
        })();
</script>

                const { error: dbErr } = await supabaseDeskClient

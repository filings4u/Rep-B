<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Platform Chat Console | filings4u Staff</title>

  <style>
    /* ========================================================================== 🎨 ZERO-CONFLICT SELF-CONTAINED GLOBAL GRID MATRIX ========================================================================== */
    :root { --bg-light: #f4f6f9; --white: #ffffff; --border-color: #e2e8f0; --text-dark: #0f172a; --text-muted: #475569; --emerald: #10b981; --staff-red: #c15254; --sidebar-width: 260px; }
    body, html { margin: 0 !important; padding: 0 !important; height: 100vh !important; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important; background-color: var(--bg-light) !important; color: var(--text-dark) !important; overflow: hidden !important; }
    .dashboard-wrapper { display: flex !important; height: 100vh !important; width: 100% !important; position: relative !important; }
    
    /* 📁 LOCKED STATIONARY SIDEBAR PANEL */
    .portal-sidebar { width: var(--sidebar-width) !important; background: var(--white) !important; border-right: 1px solid var(--border-color) !important; display: flex !important; flex-direction: column !important; position: fixed !important; top: 0 !important; left: 0 !important; height: 100vh !important; z-index: 1000 !important; box-sizing: border-box !important; }
    .sidebar-brand-block { padding: 24px 20px !important; border-bottom: 1px solid #f1f5f9 !important; text-align: center !important; box-sizing: border-box !important; }
    .admin-badge { display: inline-block !important; background: rgba(193, 82, 84, 0.08) !important; color: var(--staff-red) !important; font-size: 0.65rem !important; font-weight: 800 !important; text-transform: uppercase !important; letter-spacing: 1px !important; padding: 4px 10px !important; border-radius: 12px !important; margin-top: 6px !important; border: 1px solid rgba(193, 82, 84, 0.15) !important; }
    .sidebar-accordion-menu { flex: 1 !important; overflow-y: auto !important; padding: 15px 12px !important; box-sizing: border-box !important; }
    .accordion-trigger { width: 100% !important; background: #f8fafc !important; border: 1px solid var(--border-color) !important; padding: 10px 14px !important; font-size: 0.72rem !important; font-weight: 700 !important; color: var(--text-muted) !important; text-transform: uppercase !important; letter-spacing: 0.5px !important; display: flex !important; align-items: center !important; justify-content: space-between !important; cursor: pointer !important; border-radius: 6px !important; margin-top: 10px !important; outline: none !important; transition: all 0.2s !important; box-sizing: border-box !important; }
    .accordion-panel { max-height: 0; overflow: hidden !important; padding-left: 4px !important; box-sizing: border-box !important; transition: max-height 0.25s ease-out !important; }
    .nav-item { display: flex !important; align-items: center !important; gap: 8px !important; padding: 8px 12px !important; color: var(--text-muted) !important; text-decoration: none !important; font-size: 0.8rem !important; font-weight: 600 !important; border-radius: 6px !important; margin-top: 2px !important; white-space: nowrap !important; transition: all 0.15s !important; box-sizing: border-box !important; }
    .nav-item:hover { background: rgba(10, 31, 68, 0.02) !important; color: var(--emerald) !important; padding-left: 14px !important; }
    .nav-item.active { background: rgba(16, 185, 129, 0.08) !important; color: var(--emerald) !important; font-weight: 700 !important; }
    .sidebar-footer-lock { padding: 16px !important; border-top: 1px solid var(--border-color) !important; background: #f8fafc !important; box-sizing: border-box !important; }
    .logout-btn { width: 100% !important; background: var(--text-dark) !important; color: white !important; border: none !important; padding: 10px !important; border-radius: 6px !important; font-weight: 700 !important; font-size: 0.8rem !important; cursor: pointer !important; }
    /* 🖥️ CHAT DASHBOARD REGION CANVAS STRETCH */
    .portal-main { flex: 1 !important; display: flex !important; flex-direction: column !important; margin-left: var(--sidebar-width) !important; width: calc(100% - var(--sidebar-width)) !important; height: 100vh !important; box-sizing: border-box !important; }
    .portal-header { background: var(--white) !important; padding: 15px 40px !important; border-bottom: 1px solid var(--border-color) !important; display: flex !important; justify-content: space-between !important; align-items: center !important; box-sizing: border-box !important; width: 100% !important; height: 75px !important; }
    .header-actions-wrapper { display: flex !important; align-items: center !important; gap: 12px !important; }
    .header-clock-pill { background: #f8fafc !important; border: 1px solid var(--border-color) !important; padding: 10px 16px !important; border-radius: 10px !important; font-family: monospace !important; font-size: 0.9rem !important; font-weight: 700 !important; color: var(--text-dark) !important; display: flex !important; align-items: center !important; gap: 8px !important; box-sizing: border-box !important; height: 40px !important; white-space: nowrap !important; }
    
    /* 💬 SPLIT SCREEN OPERATIONAL LAYOUT COMPRESSION */
    .chat-layout-container { display: flex !important; flex: 1 !important; width: 100% !important; height: calc(100vh - 75px) !important; background: var(--white) !important; box-sizing: border-box !important; }
    .chat-users-panel { width: 300px !important; border-right: 1px solid var(--border-color) !important; display: flex !important; flex-direction: column !important; background: #f8fafc !important; height: 100% !important; box-sizing: border-box !important; }
    .search-users-box { padding: 15px !important; border-bottom: 1px solid var(--border-color) !important; box-sizing: border-box !important; }
    .user-search-input { width: 100% !important; padding: 10px 14px !important; border: 1px solid var(--border-color) !important; border-radius: 8px !important; background: var(--white) !important; font-size: 0.85rem !important; outline: none !important; box-sizing: border-box !important; }
    .users-scrollable-feed { flex: 1 !important; overflow-y: auto !important; box-sizing: border-box !important; }
    
    .chat-thread-panel { flex: 1 !important; display: flex !important; flex-direction: column !important; height: 100% !important; overflow: hidden !important; background: var(--white) !important; box-sizing: border-box !important; }
    .messages-timeline-scroll { flex: 1 !important; overflow-y: auto !important; padding: 30px !important; background: #fdfdfd !important; box-sizing: border-box !important; }
    
    .msg-row { display: flex !important; margin-bottom: 20px !important; width: 100% !important; }
    .msg-row.staff-sent { justify-content: flex-end !important; }
    .msg-row.client-sent { justify-content: flex-start !important; }
    .msg-bubble { max-width: 65% !important; padding: 12px 18px !important; border-radius: 12px !important; font-size: 0.9rem !important; line-height: 1.45 !important; box-shadow: 0 1px 2px rgba(0,0,0,0.02) !important; box-sizing: border-box !important; text-align: left; word-break: break-word; }
    .msg-row.staff-sent .msg-bubble { background: var(--text-dark) !important; color: #ffffff !important; border-bottom-right-radius: 2px !important; }
    .msg-row.client-sent .msg-bubble { background: #f1f5f9 !important; color: var(--text-dark) !important; border-bottom-left-radius: 2px !important; border: 1px solid var(--border-color) !important; }
    .msg-timestamp { font-size: 0.68rem !important; opacity: 0.6; display: block !important; margin-top: 4px !important; text-align: right !important; }
    
    .chat-input-footer-tray { padding: 20px 30px !important; border-top: 1px solid var(--border-color) !important; background: var(--white) !important; box-sizing: border-box !important; }
    .tray-form-grid { display: flex !important; gap: 12px !important; width: 100% !important; }
    .tray-textarea-input { flex: 1 !important; padding: 12px 16px !important; border: 1px solid var(--border-color) !important; border-radius: 8px !important; font-size: 0.92rem !important; outline: none !important; resize: none !important; font-family: inherit !important; height: 44px !important; box-sizing: border-box !important; color: var(--text-dark) !important; background: #f8fafc !important; }
    .tray-textarea-input:focus { background: #fff !important; border-color: var(--emerald) !important; }
    .btn-send { background: var(--text-dark) !important; color: white !important; border: none !important; padding: 0 24px !important; border-radius: 8px !important; font-weight: 700 !important; font-size: 0.88rem !important; cursor: pointer !important; height: 44px !important; box-sizing: border-box !important; }
    
    @media (max-width: 991px) {
      .portal-sidebar { display: none !important; }
      .portal-main { margin-left: 0 !important; width: 100% !important; }
      .portal-header { flex-direction: column !important; padding: 15px !important; height: auto !important; }
      .chat-layout-container { height: calc(100vh - 140px) !important; }
      .chat-users-panel { width: 80px !important; }
      .search-users-box { display: none !important; }
    }
  </style>
</head>

<body>
  <div class="dashboard-wrapper">
  

    <!-- 🖥️ CHAT DASHBOARD REGION CANVAS STRETCH -->
    <main class="portal-main">
      <header class="portal-header">
        <div style="text-align: left;">
          <h1 style="margin: 0; font-size: 1.3rem; font-weight: 700;">Customer Communication Desk</h1>
        </div>
        <div class="header-actions-wrapper">
          <div class="header-clock-pill">
            <span>⏱️</span>
            <span id="portal-clock">00/00/0000 | 00:00:00</span>
          </div>
        </div>
      </header>

      <!-- 💬 SPLIT SCREEN OPERATIONAL LAYOUT COMPRESSION -->
      <div class="chat-layout-container">
        <!-- LEFT USERS COLUMN FEED -->
        <aside class="chat-users-panel">
          <div class="search-users-box">
            <input type="text" id="userFeedFilterField" class="user-search-input" placeholder="Search clients..." onkeyup="if(typeof window.filterUsersFeed === 'function') { window.filterUsersFeed(); }">
          </div>
          <div class="users-scrollable-feed" id="adminUsersFeedContainer">
            <div style="text-align:center; padding:30px; color:var(--text-muted); font-size:0.8rem; font-style:italic;">Loading live accounts feed...</div>
          </div>
        </aside>

        <!-- RIGHT MAIN MESSAGE THREAD -->
        <section class="chat-thread-panel">
          <div class="messages-timeline-scroll" id="adminChatMessagesLog">
            <div style="text-align:center; padding-top:20%; color:var(--text-muted); font-size:0.85rem; font-style:italic;">
              Select a client row on the left panel to connect streaming text thread nodes.
            </div>
          </div>
          <div class="chat-input-footer-tray">
            <div class="tray-form-grid">
              <textarea id="adminChatMessageInputField" class="tray-textarea-input" placeholder="Select a client row on the left panel to begin responding..." onkeydown="if(typeof window.handleAdminChatKeyOptions === 'function') { window.handleAdminChatKeyOptions(event); }" disabled></textarea>
              <button id="adminChatSendButton" class="btn-send" onclick="if(typeof window.dispatchAdminResponseChatMessage === 'function') { window.dispatchAdminResponseChatMessage(); }" disabled>Send</button>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  
  <!-- 1. The Global Library Core MUST load absolute first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- 2. The Configuration setup creates window.supabaseClient immediately -->
  <script src="assets/js/supabase-config.js"></script>
  
  <!-- 3. The unified master script processes pricing ledgers, filters, metrics, and navigation -->
  <script src="assets/js/admin-master-ledger.js"></script>

   <!-- 3. The unified master script processes pricing ledgers, filters, metrics, and navigation -->
  <script src="assets/js/admin-navigation.js"></script>

  <!-- ========================================================================== 🏢 ADMINISTRATIVE REAL-TIME LOGIC ENGINE CONTROLLERS ========================================================================== -->
 <script>

// --- DIRECTORY ROSTER RETRIEVAL MATRIX --- 
window.synchronizeChatThreadsRoster = async function() {
    const rosterContainer = document.getElementById("adminUsersFeedContainer");
    const client = window.supabaseInstance || window.supabaseClient || chatAdminCoreClient;
    if (!rosterContainer || !client) return;

    try {
        console.log("📡 [Roster Engine] Syncing threads matrix using explicit format parameters...");
        
        // 🟢 DIRECT VIEW FETCH: Pulling your exact column names directly from your table view definition
        const { data: threads, error } = await client
            .from('admin_chat_threads_view')
            .select('client_id, last_message_content, last_message_at, sender_type, resolved_customer_name, unread_count')
            .order('last_message_at', { ascending: false });

        if (error) throw error;
        window.masterCrmThreadsCache = threads || [];

        if (window.masterCrmThreadsCache.length === 0) {
            rosterContainer.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-muted); font-size:0.8rem; font-style:italic;">No active conversations registered.</div>`;
            return;
        }

        window.renderChatSidebarList(window.masterCrmThreadsCache);

    } catch (err) {
        console.error("Roster synchronization failure:", err.message);
        // Clean inline warning block replaces old native alert popups
        rosterContainer.innerHTML = `<div style="text-align:center; padding:15px; color:var(--staff-red); font-size:0.8rem; font-weight:700;">⚠️ Directory Sync Offline.</div>`;
    }
};

window.renderChatSidebarList = function(datasetArray) {
    const rosterContainer = document.getElementById("adminUsersFeedContainer");
    if (!rosterContainer) return;

    rosterContainer.innerHTML = datasetArray.map(row => {
        // 🟢 FIXED: Added safe string lookup validation fallback to protect the variable loop logic
        const currentActiveToken = window.activeSelectedClientId || null;
        const isSelected = currentActiveToken === row.client_id;
        
        const shortUuid = String(row.client_id || '').substring(0, 8).toUpperCase();
        
        // 🟢 FIXED SIDEBAR NAMES: Display the real name from your view column, fallback to ID string if blank
        const cleanCustomerName = row.resolved_customer_name && row.resolved_customer_name.trim() !== ""
            ? row.resolved_customer_name
            : `Client Ref: ${String(row.client_id).substring(0, 8).toUpperCase()}`;

        let msgPreview = row.last_message_content || 'No text content.';
        if (msgPreview.includes("Name:")) {
            msgPreview = "📋 [New Room Handshake Onboarding Metadata]";
        } else if (msgPreview.length > 38) {
            msgPreview = msgPreview.substring(0, 35) + "...";
        }

        // 🟢 FIXED UNREAD BADGE: Read your exact integer unread_count column type definition
        const unreadCountBadge = row.unread_count && parseInt(row.unread_count) > 0 
            ? `<span style="background:#ef4444 !important; color:#ffffff !important; font-size:0.68rem !important; font-weight:800 !important; padding:2px 7px !important; border-radius:10px !important; float:right !important; box-shadow: 0 1px 3px rgba(239,68,68,0.4) !important;">${row.unread_count}</span>` 
            : '';

        const backgroundStyles = isSelected 
            ? "background: rgba(16, 185, 129, 0.08) !important; border-left: 4px solid #c15254 !important;" 
            : "background: none;";

        return `
            <div class="chat-user-thread-card" style="padding:14px 16px; border-bottom:1px solid #e2e8f0; cursor:pointer; display:flex; flex-direction:column; gap:3px; width:100%; box-sizing:border-box; transition:all 0.1s; ${backgroundStyles}" onclick="window.loadActiveThreadViewportPanel('${row.client_id}')">
                <div style="display:flex; justify-content:space-between; width:100%; align-items:center; box-sizing:border-box;">
                    <strong style="color:#0a1f44; font-size:0.85rem; font-weight:700; flex:1; text-overflow:ellipsis; white-space:nowrap; overflow:hidden;">👤 ${window.escapeChatTextMarkup(cleanCustomerName)}</strong>
                    ${unreadCountBadge}
                </div>
                <small style="color:#64748b; font-size:0.78rem; text-overflow:ellipsis; white-space:nowrap; overflow:hidden; display:block; font-weight:500;">${window.escapeChatTextMarkup(msgPreview)}</small>
            </div>
        `;
    }).join('');
};


window.filterUsersFeed = function() {
    const searchBox = document.getElementById("userFeedFilterField");
    if (!searchBox || !window.masterCrmThreadsCache) return;
    
    const parsingToken = searchBox.value.toLowerCase().trim();
    const filtered = window.masterCrmThreadsCache.filter(row => 
        String(row.client_id).toLowerCase().includes(parsingToken) || 
        String(row.resolved_customer_name || '').toLowerCase().includes(parsingToken) ||
        String(row.last_message_content).toLowerCase().includes(parsingToken)
    );
    window.renderChatSidebarList(filtered);
};

window.f4uTabNotificationIntervalInstance = null;
window.originalBrowserTabTitleString = document.title;
window.loadActiveThreadViewportPanel = async function(stringClientUuid) {
    const client = window.supabaseInstance || window.supabaseClient || chatAdminCoreClient;
    const textarea = document.getElementById("adminChatMessageInputField");
    const sendButton = document.getElementById("adminChatSendButton");
    const msgLogBox = document.getElementById("adminChatMessagesLog");
    if (!client || !textarea || !sendButton || !msgLogBox) return;

    activeSelectedClientId = String(stringClientUuid).trim();
    textarea.disabled = false;
    sendButton.disabled = false;
    textarea.placeholder = `Type response to Client...`;
    textarea.focus();

    try {
        await client.from('chat_messages').update({ is_read_by_admin: true }).eq('client_id', activeSelectedClientId);
        if (typeof window.synchronizeChatThreadsRoster === "function") {
            window.synchronizeChatThreadsRoster();
        }
        const { data: messages, error } = await client
            .from('chat_messages')
            .select('*')
            .eq('client_id', activeSelectedClientId)
            .order('created_at', { ascending: true });

        if (error) throw error;
        msgLogBox.innerHTML = "";

        if (messages && messages.length > 0) {
            messages.forEach(msg => {
                window.appendSingleChatMessageBubbleToUI(msg);
            });
        } else {
            msgLogBox.innerHTML = `<div style="text-align:center; padding-top:20%; color:var(--text-muted); font-style:italic; font-size:0.85rem;">No messages exchanged with this user yet.</div>`;
        }
        window.scrollTerminalTimelineToAbsoluteBottom();
    } catch (err) {
        console.error("Timeline retrieval failed:", err.message);
        msgLogBox.innerHTML = `<div style="text-align:center; padding-top:20%; color:var(--staff-red); font-weight:700; font-size:0.85rem;">⚠️ Timeline Connection Offline.</div>`;
    }
};

window.triggerActiveBrowserTabFlashAlert = function(clientLabel) {
    if (window.f4uTabNotificationIntervalInstance) return;
    let toggleAlertFlag = true;
    const shortIdLabel = String(clientLabel || '').substring(0, 8).toUpperCase();
    window.f4uTabNotificationIntervalInstance = setInterval(() => {
        document.title = toggleAlertFlag ? `🚨 NEW CHAT (#${shortIdLabel})` : `💬 ${window.originalBrowserTabTitleString}`;
        toggleAlertFlag = !toggleAlertFlag;
    }, 1000);
};

document.addEventListener("click", () => {
    const inputEl = document.getElementById("adminChatMessageInputField");
    if (document.activeElement === inputEl && window.f4uTabNotificationIntervalInstance) {
        clearInterval(window.f4uTabNotificationIntervalInstance);
        window.f4uTabNotificationIntervalInstance = null;
        document.title = window.originalBrowserTabTitleString;
    }
});

window.appendSingleChatMessageBubbleToUI = function(msgRow) {
    const msgLogBox = document.getElementById("adminChatMessagesLog");
    if (!msgLogBox) return;
    const currentSender = String(msgRow.sender_type || '').toLowerCase();
    const isAdminResponse = currentSender === 'admin' || currentSender === 'agent' || currentSender === 'broker' || currentSender === 'staff';
    const rowWrapper = document.createElement("div");
    rowWrapper.className = isAdminResponse ? "msg-row staff-sent" : "msg-row client-sent";
    const readableTime = msgRow.created_at ? new Date(msgRow.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    let secureCleanText = window.escapeChatTextMarkup(msgRow.message_content || "");
    
    // Inbound metadata storage payload unpacker to support user uploaded files cleanly
    const meta = msgRow.payload_metadata || {};
    if (meta.document_url) {
        const bucketSource = meta.storage_file_path || "chat_documents";
        const attachmentName = meta.file_name || "Download File Attachment";
        secureCleanText += `
            <a href="#" class="chat-file-embed-link admin-cloud-download" data-bucket="${bucketSource}" data-path="${meta.document_url}" style="display:flex; align-items:center; gap:6px; font-weight:700; color:inherit; margin-top:6px;">
                📁 [Attached File]: ${window.escapeChatTextMarkup(attachmentName)} ➔
            </a>
        `;
    }

    rowWrapper.innerHTML = `
        <div class="msg-bubble">
            <div>${secureCleanText}</div>
            <span class="msg-timestamp">${readableTime}</span>
        </div>
    `;

    rowWrapper.querySelectorAll(".admin-cloud-download").forEach(link => {
        link.addEventListener("click", async function(e) {
            e.preventDefault();
            const bucket = this.getAttribute("data-bucket");
            const path = this.getAttribute("data-path");
            try {
                const { data, error } = await client.storage.from(bucket).createSignedUrl(path, 90);
                if (error) throw error;
                window.open(data.signedUrl, '_blank');
            } catch(err) {
                console.error("Staff access to payload link rejected: ", err.message);
            }
        });
    });

    msgLogBox.appendChild(rowWrapper);
    window.scrollTerminalTimelineToAbsoluteBottom();
};

window.dispatchAdminResponseChatMessage = async function() {
    const client = window.supabaseInstance || window.supabaseClient || chatAdminCoreClient;
    const textarea = document.getElementById("adminChatMessageInputField");
    if (!client || !textarea || !activeSelectedClientId) return;
    const rawText = textarea.value.trim();
    if (!rawText) return;

    textarea.disabled = true;
    try {
  // Inside your admin-chat.html transmission block
const { error } = await client
    .from('chat_messages')
    .insert([{
        client_id: activeSelectedClientId,
        message_content: rawText,
        sender_type: 'admin',
        created_at: new Date().toISOString(),
        payload_metadata: {
            is_read_by_admin: true,
            is_read_by_client: false
        }
    }]);


        if (error) throw error;
        textarea.value = "";
        await window.loadActiveThreadViewportPanel(activeSelectedClientId);
    } catch (err) {
        console.error("Message delivery transmission crash:", err.message);
        // FIXED: Replaced browser native alerts with temporary input element error flash states
        const savedPlaceholder = textarea.placeholder;
        textarea.placeholder = `✕ Transmission Failed: ${err.message}`;
        setTimeout(() => { textarea.placeholder = savedPlaceholder; }, 4000);
    } finally {
        textarea.disabled = false;
        textarea.focus();
    }
};

window.handleAdminChatKeyOptions = function(event) {
    if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        window.dispatchAdminResponseChatMessage();
    }
};

window.scrollTerminalTimelineToAbsoluteBottom = function() {
    const msgLogBox = document.getElementById("adminChatMessagesLog");
    if (msgLogBox) msgLogBox.scrollTop = msgLogBox.scrollHeight;
};

window.escapeChatTextMarkup = function(str) {
    if (!str) return "";
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#x27;");
};

function toggleSidebarAccordion(buttonElement) {
    if (!buttonElement) return;
    buttonElement.classList.toggle('active');
    const panel = buttonElement.nextElementSibling;
    if (panel) {
        if (panel.style.maxHeight && panel.style.maxHeight !== "0px") {
            panel.style.maxHeight = "0px";
        } else {
            panel.style.maxHeight = panel.scrollHeight + "px";
        }
    }
}

document.getElementById("sidebarFallbackLogoutBtn")?.addEventListener("click", () => {
    window.localStorage.clear();
    window.sessionStorage.clear();
    window.location.replace("admin-login.html");
});

// --- STAGE 2: REAL-TIME CLIENT SYNC CHANNEL DISPATCHERS ---
window.initializeAdminRealtimeMessagingPipeline = function() {
    const client = window.supabaseInstance || window.supabaseClient || chatAdminCoreClient;
    if (!client) return;

    console.log("📡 [Real-time Engine] Binding global workspace listener channel...");

    // 🟢 FIXED: Use explicit window object scope referencing to eliminate undefined lookup crashes
    if (window.realtimeChatSubscriptionChannel) {
        client.removeChannel(window.realtimeChatSubscriptionChannel);
    }

    // Subscribe straight to raw chat mutations to bypass static view refresh lockouts
    window.realtimeChatSubscriptionChannel = client.channel('admin_master_chat_stream')
        .on('postgres_changes', { 
            event: 'INSERT', 
            schema: 'public', 
            table: 'chat_messages' 
        }, async (payload) => {
            console.log("📡 [Inbound Live Broadcast Caught]:", payload.new);
            const incomingClientId = payload.new.client_id;

            // Trigger temporary audio alert indicators on customer messages
            if (String(payload.new.sender_type).toLowerCase() === 'client') {
                try {
                    new Audio("assets/sounds/notification.mp3").play().catch(() => {});
                } catch(e) {}
                if (typeof window.triggerActiveBrowserTabFlashAlert === "function") {
                    window.triggerActiveBrowserTabFlashAlert(incomingClientId);
                }
            }

            // Case A: If the staff member is actively viewing this specific customer's room
            if ((window.activeSelectedClientId || null) === incomingClientId) {
                // Instantly construct and append the text bubble row to the layout tree in real-time
                window.appendSingleChatMessageBubbleToUI(payload.new);

                // Natively clear unread flags on the backend silently
                await client.from('chat_messages')
                    .update({ is_read_by_admin: true })
                    .eq('client_id', window.activeSelectedClientId);
            }

            // Case B: Always regenerate the left column roster list view parameters to shift active rows to the top
            await window.synchronizeChatThreadsRoster();
        })
        .subscribe((status) => {
            console.log(`🔌 [Real-time Pipeline Status Switch]: ${status}`);
        });
};

// --- INITIALIZER RUN EXECUTIONS ---
// Replace the top-level boot initializer listener block in your <script> setup with these direct triggers:
const clientInstanceHook = window.supabaseInstance || window.supabaseClient || chatAdminCoreClient;
if (clientInstanceHook) {
    // Fire off immediate async layout state hydrations as soon as script block compiles
    (async () => {
        // Initialize window globals safely before running loops
        if (typeof window.activeSelectedClientId === "undefined") window.activeSelectedClientId = null;
        if (typeof window.realtimeChatSubscriptionChannel === "undefined") window.realtimeChatSubscriptionChannel = null;

        await window.synchronizeChatThreadsRoster();
        window.initializeAdminRealtimeMessagingPipeline();
    })();
}
</script>

    <!-- 🎯 LIVE SELF-CONTAINED CLOCK ENGINE DRIVER -->
    <script>
        (function() {
            function updateAdminSidebarClock() {
                const clockElement = document.getElementById('portal-clock');
                if (clockElement) {
                    const now = new Date();
                    clockElement.innerText = now.toLocaleTimeString([], {
                        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                    });
                }
            }
            updateAdminSidebarClock();
            setInterval(updateAdminSidebarClock, 1000);

            window.handleAdminSignOutLogout = async function() {
                const client = window.adminSupabaseInstance || window.supabase;
                if (client?.auth) {
                    try { await client.auth.signOut(); } catch (e) {}
                }
                sessionStorage.clear();
                window.location.href = 'index.html';
            };
        })();
    </script>

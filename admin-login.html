<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c15254">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-navbutton-color" content="#c15254">
    <title>Directorate Control Panel | filings4u Staff Terminal</title>
    
       <!-- PRODUCTION CDN INFRASTRUCTURE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>

    <!-- 🛠️ COMBINED SEQUENTIAL LOADER CONTROLLER -->
    <script>
        // Use a unified loading sequence to prevent asynchronous race condition script crashes
        document.addEventListener("DOMContentLoaded", async () => {
            // 1. Initialize your custom global configuration script parameters
            if (typeof initializeGlobalSupabase === "function") {
                await initializeGlobalSupabase();
            }
            
            // 2. Safely activate your core application logic scripts now that elements exist
            if (typeof startAdminLoginEngine === "function") {
                startAdminLoginEngine();
            }
        });
    </script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/admin-login.js"></script>

    
    <!-- 🖥️ EXTRACTED CENTRAL PORTAL ASSET FILES LINKED -->
    <link rel="stylesheet" href="assets/css/admin-core.css">


    <!-- 🎨 STYLESHEET CHANNELS -->
    <link rel="stylesheet" href="assets/css/portal-global.css">
    <link rel="stylesheet" href="assets/css/responsive.css"> <!-- Linked cleanly here -->

    <script src="assets/js/wizard-sync.js"></script> <!-- Linked cleanly here -->

    <link rel="icon" type="image/png" href="images/fav.png">
    
    <style>
       /* ==========================================================================
   🛠️ RESILIENT MOBILE MOBILE MEDIA QUERY BALANCER OVERRIDES
   ========================================================================== */
@media (max-width: 991px) {
    html, body {
        overflow: auto !important; /* Restores simple screen scrolling capacity */
        height: auto !important;
        min-height: 100vh !important;
    }

    .split-container {
        flex-direction: column !important; /* Stacks image above the form elements */
        height: auto !important;
        min-height: 100vh !important;
        overflow: visible !important;
    }

    /* 🎯 THE CRITICAL OVERRIDE: Prevent the asset from stealing space */
    .image-side {
        width: 100% !important;
        max-width: 100% !important;
        height: 160px !important; /* Compresses the top banner image down to a tight row header */
        min-height: 160px !important;
        padding: 20px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        box-sizing: border-box !important;
    }

    /* Recalculate title padding placement positions inside the compact banner */
    .image-side div[style*="position: absolute"] {
        position: static !important; /* Unpins the absolute top-left offsets */
        text-align: center !important;
    }

    .image-content h1 {
        font-size: 1.4rem !important; /* Shrinks the massive header font size */
        margin-bottom: 4px !important;
        text-align: center !important;
    }

    .image-content p {
        display: none !important; /* Completely drops descriptive subtext paragraphs on mobile views */
    }

    /* Adjust the bottom container where your form input matrix card sits */
    .form-side {
        width: 100% !important;
        height: auto !important;
        padding: 30px 15px 50px 15px !important; /* Comfortable vertical spacing at the bottom */
        display: flex !important;
        align-items: flex-start !important; /* Snaps form near the image instead of centering off-screen */
        justify-content: center !important;
        background-color: #f8fafc !important;
    }

    .login-card {
        width: 100% !important;
        max-width: 380px !important;
        padding: 25px 20px !important;
        box-shadow: 0 10px 25px rgba(10, 31, 68, 0.04) !important;
        border-radius: 12px !important;
        margin: 0 auto !important;
    }
}

    </style>
</head>
<body>
    <div class="split-container">
        <!-- LEFT SIDE: ADMIN IDENTIFIER CAP CANVAS -->
        <section class="image-side">
            <div style="position: absolute; top: 60px; left: 60px; text-align: left;">
                <div class="image-content">
                    <h1>Internal Staff<br>Terminal.</h1>
                    <p>Authorized access point for corporate compliance infrastructure, active ledger audits, and platform sync utilities.</p>
                </div>
            </div>
        </section>

        <!-- RIGHT SIDE: CONTROL FORM -->
        <section class="form-side">
            <div class="login-card">
                <div class="logo-container"><img src="images/logo.png" alt="filings4u logo"></div>
                <div class="admin-badge">Directorate System Security</div>
                <h2>Staff Session Portal</h2>
                <p>Verify administrative token parameters to launch the performance dashboard.</p>
                
       <form id="adminLoginForm" novalidate>
    <div class="form-group">
        <label for="email">Staff Email Address</label>
        <!-- 🎯 PRODUCTION REQUIRED HOOK: id="email" -->
        <input type="email" id="email" required autocomplete="email" placeholder="username@filings4u.com">
    </div>
    
    <div class="form-group">
        <label for="password">Security Password</label>
        <div style="position: relative; display: flex; align-items: center;">
            <!-- 🎯 PRODUCTION REQUIRED HOOK: id="password" -->
            <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" style="padding-right: 45px;">
            <button type="button" id="passwordToggleBtn" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; display: flex; align-items: center; justify-content: center; color: #64748b; user-select: none;">
                👁️
            </button>
        </div>
        <div id="password-error" class="error-msg"></div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Verify Terminal Session →</button>
</form>

            </div>
        </section>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const passwordInput = document.getElementById('password');
            const passwordToggleBtn = document.getElementById('passwordToggleBtn');
            if (passwordToggleBtn && passwordInput) {
                passwordToggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        passwordToggleBtn.innerText = '🙈';
                    } else {
                        passwordInput.type = 'password';
                        passwordToggleBtn.innerText = '👁️';
                    }
                });
            }
        });
    </script>
</body>
</html>

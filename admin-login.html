<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c15254">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-navbutton-color" content="#c15254">
    <title>Directorate Control Panel | filings4u Staff Terminal</title>
    
    <!-- 🎯 GLOBAL FAVICON BRAND MATRIX ANCHOR -->
    <link rel="icon" type="image/png" href="images/fav.png">
    
    <!-- PRODUCTION CDN INFRASTRUCTURE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    
    <!-- 🔒 HARDENED SEQUENTIAL AUTH ENFORCEMENT ENGINE -->
    <script>
        // Use a unified loading sequence to prevent asynchronous race condition script crashes
        document.addEventListener("DOMContentLoaded", async () => {
            // 1. Initialize your custom global configuration script parameters safely first
            if (typeof initializeGlobalSupabase === "function") {
                await initializeGlobalSupabase();
            }
            
            // 2. Safely activate your core application logic scripts now that elements exist
            if (typeof startAdminLoginEngine === "function") {
                startAdminLoginEngine();
            }
        });
    </script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/admin-login.js"></script>
    
    <!-- 🖥️ EXTRACTED CENTRAL PORTAL ASSET FILES LINKED -->
    <link rel="stylesheet" href="assets/css/admin-core.css">
    <link rel="stylesheet" href="assets/css/portal-global.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <script src="assets/js/wizard-sync.js"></script>

    <style>
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
            --text-gray: #44526c;
            --staff-red: #c15254;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: var(--bg-light);
        }

        .split-container {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* 🎯 RESTORED BACKING CANVAS IMAGE WITH PROTECTED ATTRIBUTION STRINGS */
        .image-side {
            flex: 1;
            background: linear-gradient(rgba(10, 31, 68, 0.85), rgba(193, 82, 84, 0.85)), url('images/login-hero.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 60px;
            box-sizing: border-box;
            position: relative;
        }

        .image-content h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 800;
        }

        .image-content p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 500px;
            line-height: 1.5;
        }

        .form-side {
            flex: 1;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(10,31,68,0.06);
            text-align: center;
            z-index: 10;
            box-sizing: border-box;
        }

        .logo-container {
            margin-bottom: 15px;
        }

        .logo-container img {
            height: 38px;
        }

        .admin-badge {
            display: inline-block;
            background: rgba(193, 82, 84, 0.1);
            color: var(--staff-red);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(193, 82, 84, 0.2);
        }

        .login-card h2 {
            color: var(--primary-blue);
            font-size: 1.4rem;
            margin: 0 0 6px 0;
            font-weight: 800;
        }

        .login-card p.panel-subtitle {
            color: var(--text-gray);
            margin-bottom: 25px;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-top: 0;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-blue);
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.25s;
            color: var(--primary-blue);
        }

        .form-group input:focus {
            border-color: var(--staff-red);
            box-shadow: 0 0 0 4px rgba(193, 82, 84, 0.08);
        }

        .form-group input.field-error {
            border-color: #e53e3e !important;
            box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.15) !important;
            animation: formFieldShake 0.4s ease-in-out;
        }

        @keyframes formFieldShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-blue) !important;
            color: var(--white) !important;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 5px;
            display: block;
        }

        .btn-login:hover {
            background-color: #122d5a !important;
        }

        .btn-login:active {
            transform: scale(0.99);
        }

        .error-msg {
            color: var(--staff-red);
            font-size: 0.78rem;
            margin-top: 8px;
            font-weight: 600;
            text-align: left;
            min-height: 1.2em;
            line-height: 1.3;
        }

        /* ==========================================================================
           🛠️ MOBILE FLUID GRID COMPRESSION MEDIA QUERIES
           ========================================================================== */
        @media (max-width: 991px) {
            html, body {
                overflow: auto !important;
                height: auto !important;
                min-height: 100vh !important;
            }

            .split-container {
                flex-direction: column !important;
                height: auto !important;
                min-height: 100vh !important;
                overflow: visible !important;
            }

            .image-side {
                width: 100% !important;
                max-width: 100% !important;
                height: 160px !important;
                min-height: 160px !important;
                padding: 20px !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                box-sizing: border-box !important;
            }

            .image-side div[style*="position: absolute"] {
                position: static !important;
                text-align: center !important;
            }

            .image-content h1 {
                font-size: 1.4rem !important;
                margin-bottom: 4px !important;
                text-align: center !important;
            }

            .image-content p {
                display: none !important;
            }

            .form-side {
                width: 100% !important;
                height: auto !important;
                padding: 30px 15px 50px 15px !important;
                display: flex !important;
                align-items: flex-start !important;
                justify-content: center !important;
                background-color: #f8fafc !important;
                overflow: visible !important;
            }

            .login-card {
                width: 100% !important;
                max-width: 380px !important;
                padding: 25px 20px !important;
                box-shadow: 0 10px 25px rgba(10, 31, 68, 0.04) !important;
                border-radius: 12px !important;
                margin: 0 auto !important;
            }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <!-- LEFT SIDE VIEWPORT BANNER CONSOLE -->
        <section class="image-side">
            <div style="position: absolute; top: 60px; left: 60px; text-align: left;">
                <div class="image-content">
                    <h1>Internal Staff<br>Terminal.</h1>
                    <p>Authorized access point for corporate compliance infrastructure, active ledger audits, and platform sync utilities.</p>
                </div>
            </div>
        </section>

        <!-- RIGHT SIDE: ADMINISTRATIVE SECURITY VERIFICATION FORM -->
        <section class="form-side">
            <div class="login-card">
                <div class="logo-container">
                    <img src="images/logo.png" alt="filings4u logo">
                </div>
                <div class="admin-badge">Directorate System Security</div>
                <h2>Staff Session Portal</h2>
                <p class="panel-subtitle">Verify administrative token parameters to launch the performance dashboard.</p>
                
                <!-- 🎯 REQUIRED BINDING HOOK: id="adminLoginForm" -->
                <form id="adminLoginForm" novalidate>
                    <div class="form-group">
                        <label for="email">Staff Email Address</label>
                        <input type="email" id="email" required autocomplete="email" placeholder="username@filings4u.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Security Password</label>
                        <div style="position: relative; display: flex; align-items: center;">
                            <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" style="padding-right: 45px;">
                            <!-- 👁️ INTERACTIVE VISIBILITY TOGGLE BUTTON -->
                            <button type="button" id="passwordToggleBtn" style="position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; display: flex; align-items: center; justify-content: center; color: #64748b; user-select: none;">
                                👁️
                            </button>
                        </div>
                        <div id="password-error" class="error-msg"></div>
                    </div>
                    
                    <button type="submit" class="btn-login" id="loginBtn">Verify Terminal Session →</button>
                </form>
            </div>
        </section>
    </div>

    <!-- UI PASSWORD EYE TOGGLE INTERACTION BINDINGS -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const passwordInput = document.getElementById('password');
            const passwordToggleBtn = document.getElementById('passwordToggleBtn');
            if (passwordToggleBtn && passwordInput) {
                passwordToggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        passwordToggleBtn.innerText = '🙈';
                    } else {
                        passwordInput.type = 'password';
                        passwordToggleBtn.innerText = '👁️';
                    }
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Staff Gateway | filings4u Administrative Suite</title>
  <link rel="icon" type="image/png" href="images/fav.png">
  <!-- PLATFORM CORE CDN INFRASTRUCTURE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
  <style>
    :root { --bg-light: #f8fafc; --white: #ffffff; --border-color: #e2e8f0; --text-dark: #0f172a; --text-muted: #475569; --staff-red: #c15254; --emerald: #10b981; }
    body, html { margin: 0; padding: 0; min-height: 100vh; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-light); color: var(--text-dark); display: flex; align-items: center; justify-content: center; }
    .login-container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
    .gateway-card { background: var(--white); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px 32px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); text-align: center; box-sizing: border-box; }
    .logo-block img { height: 38px; width: auto; margin-bottom: 8px; }
    .badge { display: inline-block; background: rgba(193, 82, 84, 0.08); color: var(--staff-red); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 4px 12px; border-radius: 9999px; margin-bottom: 24px; border: 1px solid rgba(193, 82, 84, 0.15); }
    h1 { font-size: 1.4rem; font-weight: 800; margin: 0 0 8px 0; color: var(--text-dark); letter-spacing: -0.5px; }
    p { font-size: 0.85rem; color: var(--text-muted); margin: 0 0 32px 0; line-height: 1.4; }
    .form-group { text-align: left; margin-bottom: 20px; position: relative; }
    label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; color: var(--text-dark); }
    input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem; color: var(--text-dark); background: #f8fafc; outline: none; box-sizing: border-box; transition: all 0.2s ease; }
    input:focus { background: var(--white); border-color: var(--staff-red); box-shadow: 0 0 0 4px rgba(193, 82, 84, 0.08); }
    .submit-btn { width: 100%; background: var(--text-dark); color: var(--white); border: none; padding: 14px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background 0.2s ease; margin-top: 12px; box-sizing: border-box; }
    .submit-btn:hover { background: #1e293b; }
    #status-msg { display: none; font-size: 0.82rem; font-weight: 600; text-align: left; margin-top: 16px; padding: 12px; border-radius: 6px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="gateway-card">
      <div class="logo-block"><img src="images/logo.png" alt="filings4u Logo"></div>
      <div><span class="badge">Internal Staff Slat</span></div>
      <h1>Directorate Security Login</h1>
      <p>Authorized access terminal for corporate compliance managers and operational staff parameters.</p>
      
      <form id="adminLoginForm" novalidate>
        <div class="form-group">
          <label>Operator Email Address</label>
          <input type="email" id="operatorEmail" required placeholder="name@filings4u.com">
        </div>
        <div class="form-group">
          <label>Security Key Access Password</label>
          <input type="password" id="operatorPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="submit-btn" id="loginBtn">Authenticate Session ➔</button>
      </form>
      <div id="status-msg"></div>
    </div>
  </div>

  <!-- INJECT SHARED CLIENT SETUP CONFIG -->
  <script src="assets/js/supabase-config.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      "use strict";

      const form = document.getElementById("adminLoginForm");
      const emailInput = document.getElementById("operatorEmail");
      const passwordInput = document.getElementById("operatorPassword");
      const submitBtn = document.getElementById("loginBtn");
      const statusMsg = document.getElementById("status-msg");

      if (!form || !emailInput || !passwordInput || !submitBtn || !statusMsg) {
        console.error("✕ Critical UI Error: Missing core administrative authorization elements.");
        return;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        // 1. Reset state messages and apply active loading parameter strings
        statusMsg.style.display = "none";
        statusMsg.style.background = "transparent";
        statusMsg.style.color = "inherit";
        statusMsg.textContent = "";

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          statusMsg.style.display = "block";
          statusMsg.style.background = "#fef2f2";
          statusMsg.style.color = "#991b1b";
          statusMsg.textContent = "✕ Validation Error: Both credentials fields are required.";
          return;
        }

        // 🛡️ SECURITY DOMAIN RESTRICTION CHECK: Block non-internal routing attempts early
        if (!email.toLowerCase().endsWith("@filings4u.com") && !email.toLowerCase().endsWith("@roselandcompanies.com")) {
          statusMsg.style.display = "block";
          statusMsg.style.background = "#fef2f2";
          statusMsg.style.color = "#991b1b";
          statusMsg.textContent = "✕ Access Denied: Unrecognized clearance string. This portal is strictly limited to verified administrative operators.";
          return;
        }

        const originalBtnText = submitBtn.textContent;
        submitBtn.textContent = "Verifying Handshake Clearance...";
        submitBtn.disabled = true;

        const client = window.supabaseInstance || window.supabaseClient;
        if (!client || typeof client.auth?.signInWithPassword !== 'function') {
          statusMsg.style.display = "block";
          statusMsg.style.background = "#fef2f2";
          statusMsg.style.color = "#991b1b";
          statusMsg.textContent = "✕ System Error: Database authorization client uninitialized.";
          submitBtn.textContent = originalBtnText;
          submitBtn.disabled = false;
          return;
        }

        try {
          // 2. Transmit secure encrypted connection parameters over network gateway channels
          const { data, error } = await client.auth.signInWithPassword({ email, password });

          if (error) throw error;

          if (data?.session) {
            statusMsg.style.display = "block";
            statusMsg.style.background = "#ecfdf5";
            statusMsg.style.color = "#047857";
            statusMsg.textContent = "✓ Authentication approved! Synchronizing platform token profiles...";

            // Redirect smoothly to your primary control desk performance matrix hub layout
            setTimeout(() => {
              window.location.href = "admin-dashboard.html";
            }, 1000);
          } else {
            throw new Error("Handshake aborted: Core user authentication profile failed to stabilize.");
          }

        } catch (authException) {
          console.error("✕ Authentication barrier gate crash:", authException.message || authException);
          statusMsg.style.display = "block";
          statusMsg.style.background = "#fef2f2";
          statusMsg.style.color = "#991b1b";
          statusMsg.textContent = `✕ Identity Verification Failed: ${authException.message || "Invalid credentials configuration parameters."}`;
          
          submitBtn.textContent = originalBtnText;
          submitBtn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>

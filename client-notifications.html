<!-- ==========================================================================
     🔔 EMBEDDED MODAL FEED PANELS: INTEGRATED NOTIFICATIONS HUD (PART 1)
     ========================================================================== -->
<div id="integratedNotificationPanelOverlay" style="position: fixed !important; top: 0 !important; right: -450px !important; width: 420px !important; max-width: 100% !important; height: 100vh !important; background: #ffffff !important; box-shadow: -5px 0 25px rgba(0,0,0,0.15) !important; z-index: 99999 !important; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important; display: flex !important; flex-direction: column !important; box-sizing: border-box !important; font-family: sans-serif !important;">
  
  <!-- Panel Header Block Components -->
  <div style="padding: 20px !important; border-bottom: 1px solid #e2e8f0 !important; display: flex !important; justify-content: space-between !important; align-items: center !important; background: #0a1f44 !important; color: #ffffff !important;">
    <div>
      <h2 style="margin: 0 !important; font-size: 1.2rem !important; font-weight: 800 !important; color: #ffffff !important;">Notifications Feed</h2>
      <p style="margin: 3px 0 0 0 !important; font-size: 0.75rem !important; color: #94a3b8 !important;">Review account updates and alert despatches</p>
    </div>
    <button id="closeIntegratedNotificationPanelBtn" style="background: transparent !important; border: 0 !important; color: #ffffff !important; font-size: 1.4rem !important; cursor: pointer !important; padding: 5px !important; line-height: 1 !important;">✕</button>
  </div>

  <!-- Internal Navigation View Tabs Matrix Filters -->
  <div style="display: flex !important; background: #f8fafc !important; border-bottom: 1px solid #e2e8f0 !important; padding: 10px !important; gap: 8px !important;">
    <button id="modalFilterActiveBtn" style="flex: 1 !important; padding: 8px !important; background: #0070f3 !important; color: #ffffff !important; border: 0 !important; border-radius: 4px !important; font-size: 0.8rem !important; font-weight: 700 !important; cursor: pointer !important; transition: all 0.2s ease !important;">Inbox</button>
    <button id="modalFilterArchivedBtn" style="flex: 1 !important; padding: 8px !important; background: #e2e8f0 !important; color: #475569 !important; border: 0 !important; border-radius: 4px !important; font-size: 0.8rem !important; font-weight: 700 !important; cursor: pointer !important; transition: all 0.2s ease !important;">Archived</button>
  </div>

  <!-- Dynamic List Container Box Elements -->
  <div id="modalNotificationsScrollContainer" style="flex: 1 !important; overflow-y: auto !important; padding: 20px !important; display: flex !important; flex-direction: column !important; gap: 15px !important; background: #f8fafc !important;">
    <div style="text-align: center !important; padding: 30px !important; color: #64748b !important; font-size: 0.9rem !important;">Synchronizing account alerts feed...</div>
  </div>
</div>

<!-- ==========================================================================
     ⚙️ INTEGRATED SUB-ENGINE MANAGER CONTROLLER (PART 2)
     ========================================================================== -->
<script>
(function deployIntegratedNotificationsHudEngine() {
  "use strict";

  let modalFilterState = "active"; // active or archived
  
  const HUD = {
    overlay: document.getElementById('integratedNotificationPanelOverlay'),
    closeBtn: document.getElementById('closeIntegratedNotificationPanelBtn'),
    activeTab: document.getElementById('modalFilterActiveBtn'),
    archiveTab: document.getElementById('modalFilterArchivedBtn'),
    scroller: document.getElementById('modalNotificationsScrollContainer'),
bellLinkWrapper: document.getElementById('dashboardBellTriggerBtn')

  };

  const syncVerificationLoop = setInterval(() => {
    const client = window.supabaseClient || window.supabase;
    if (client && client.auth) {
      clearInterval(syncVerificationLoop);
      bindNotificationPanelTriggers(client);
    }
  }, 120);

  function bindNotificationPanelTriggers(client) {
    if (!HUD.overlay || !HUD.scroller) return;

    // 1. INTERCEPT BELL ICON CLICK: Force toggle side layout drawer slide-in view overlays
    if (HUD.bellLinkWrapper) {
      HUD.bellLinkWrapper.addEventListener('click', (event) => {
        event.preventDefault();
        HUD.overlay.style.right = "0px";
        triggerActiveDataFetch(client);
      });
    }

    if (HUD.closeBtn) {
      HUD.closeBtn.addEventListener('click', () => {
        HUD.overlay.style.right = "-450px";
      });
    }

    // 2. TOGGLE FILTER STRIPS CONTROLS UI LAYOUT
    if (HUD.activeTab && HUD.archiveTab) {
      HUD.activeTab.addEventListener('click', () => {
        modalFilterState = "active";
        HUD.activeTab.style.cssText = "flex: 1; padding: 8px; background: #0070f3; color: white; border: 0; border-radius: 4px; font-size: 0.8rem; font-weight: 700; cursor: pointer;";
        HUD.archiveTab.style.cssText = "flex: 1; padding: 8px; background: #e2e8f0; color: #475569; border: 0; border-radius: 4px; font-size: 0.8rem; font-weight: 700; cursor: pointer;";
        triggerActiveDataFetch(client);
      });

      HUD.archiveTab.addEventListener('click', () => {
        modalFilterState = "archived";
        HUD.archiveTab.style.cssText = "flex: 1; padding: 8px; background: #0070f3; color: white; border: 0; border-radius: 4px; font-size: 0.8rem; font-weight: 700; cursor: pointer;";
        HUD.activeTab.style.cssText = "flex: 1; padding: 8px; background: #e2e8f0; color: #475569; border: 0; border-radius: 4px; font-size: 0.8rem; font-weight: 700; cursor: pointer;";
        triggerActiveDataFetch(client);
      });
    }

    // 3. REGISTER BACKGROUND LISTENER BROADCAST STREAM CHANNELS
    try {
      client.auth.getSession().then(({ data: { session } }) => {
        if (!session) return;
        const uid = session.user.id;
        
        client.channel('embedded-hud-sync-channel')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'portal_notifications', filter: `user_id=eq.${uid}` }, () => {
            triggerActiveDataFetch(client);
          }).subscribe();
      });
    } catch(err) { console.warn("Realtime streaming pipeline deferred safely."); }
  }

  async function triggerActiveDataFetch(client) {
    try {
      const { data: { session } } = await client.auth.getSession();
      if (!session) return;
      const uid = session.user.id;

      let baseQuery = client.from('portal_notifications').select('*').eq('user_id', uid);
      baseQuery = baseQuery.eq('is_archived', (modalFilterState === "archived"));

      const { data: notifications, error } = await baseQuery.order('created_at', { ascending: false });

      if (error || !notifications || notifications.length === 0) {
        HUD.scroller.innerHTML = `<div style="text-align: center; padding: 30px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; color: #64748b; font-size: 0.85rem; font-weight: 500;">No notifications items matched in this folder context.</div>`;
        return;
      }

      HUD.scroller.innerHTML = '';

      notifications.forEach(item => {
        const rowItem = document.createElement('div');
        const unreadIndicatorBorder = item.is_read ? '1px solid #e2e8f0' : '1.5px solid #0070f3';
        const itemBackgroundFill = item.is_read ? '#ffffff' : '#f0f7ff';

        rowItem.style.cssText = `background: ${itemBackgroundFill}; border: ${unreadIndicatorBorder}; padding: 15px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.02); transition: all 0.2s ease;`;
        
        rowItem.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;">
            <div style="text-align: left;">
              <h4 style="margin: 0; font-size: 0.95rem; font-weight: 700; color: #0a1f44;">${item.title}</h4>
              <small style="color: #94a3b8; font-size: 0.7rem;">${new Date(item.created_at).toLocaleDateString()} | ${new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
            </div>
            <span style="font-size: 0.6rem; font-weight: 800; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; background: ${item.is_read ? '#e2e8f0' : '#0070f3'}; color: ${item.is_read ? '#475569' : '#ffffff'};">${item.is_read ? 'Read' : 'New'}</span>
          </div>
          <p style="margin: 0; color: #334155; font-size: 0.85rem; line-height: 1.4; white-space: pre-wrap; text-align: left;">${item.message}</p>
          <div style="display: flex; gap: 8px; border-top: 1px solid #f1f5f9; padding-top: 8px; justify-content: flex-end;">
            ${!item.is_read ? `<button class="hud-read-action" style="padding: 4px 8px; font-size: 0.7rem; background: #0a1f44; color: white; border: 0; border-radius: 3px; cursor: pointer; font-weight: 600;">Read</button>` : ''}
            <button class="hud-archive-action" style="padding: 4px 8px; font-size: 0.7rem; background: #e2e8f0; color: #475569; border: 0; border-radius: 3px; cursor: pointer; font-weight: 600;">${item.is_archived ? 'Restore' : 'Archive'}</button>
            <button class="hud-delete-action" style="padding: 4px 8px; font-size: 0.7rem; background: #fce8e6; color: #c5221f; border: 0; border-radius: 3px; cursor: pointer; font-weight: 600;">Delete</button>
          </div>
        `;

        // Attach explicit execution actions onto row layout control click handlers
        const readActionBtn = rowItem.querySelector('.hud-read-action');
        const archiveActionBtn = rowItem.querySelector('.hud-archive-action');
        const deleteActionBtn = rowItem.querySelector('.hud-delete-action');

        if (readActionBtn) readActionBtn.addEventListener('click', async () => {
await client.from('portal_notifications').update({ is_read: true }).eq('id', item.id);});if (archiveActionBtn) archiveActionBtn.addEventListener('click', async () => {await client.from('portal_notifications').update({ is_archived: !item.is_archived, is_read: true }).eq('id', item.id);});if (deleteActionBtn) deleteActionBtn.addEventListener('click', async () => {if (confirm("Permanently purge this item log description?")) {await client.from('portal_notifications').delete().eq('id', item.id);}});HUD.scroller.appendChild(rowItem);});} catch (globalCatchErr) { console.error("HUD failed rendering updates:", globalCatchErr); }}})();

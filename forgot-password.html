<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Set Access Password | filings4u</title>
  <link rel="stylesheet" href="assets/css/portal-global.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  
  <!-- FontAwesome Integration Route for Eye Icons and Interface Indicators -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- ✅ FIXED: Cloudflare Turnstile is now properly loaded as a JavaScript component script asset instead of a CSS stylesheet link tag -->
  <script src="https://www.cloudflare.com/turnstile/v0/api.js" async defer></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/wizard-sync.js"></script>
  <link rel="icon" type="image/png" href="images/fav.png">
  
  <style>
    .form-group input.field-error { border-color: #e53e3e !important; box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.15) !important; animation: fieldShake 0.4s ease-in-out; }
    .form-group input:focus { border-color: #10b981 !important; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08) !important; }
    @keyframes fieldShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    .password-wrapper { position: relative; display: flex; align-items: center; }
    .toggle-password-eye { position: absolute; right: 14px; color: #94a3b8; cursor: pointer; font-size: 0.95rem; padding: 4px; user-select: none; transition: color 0.2s ease; }
    .toggle-password-eye:hover { color: #475569; }
  </style>
</head>

<body>
  
  <div class="split-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; padding: 15px; box-sizing: border-box;">
    <div class="login-card" style="width: 100%; max-width: 400px; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 20px 40px rgba(10,31,68,0.06);">
      <div class="logo-container" style="margin-bottom: 20px;">
        <img src="images/logo.png" alt="logo" style="height: 38px;">
      </div>
      
      <h2 id="portal-view-title" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #0a1f44; margin-top: 0;">Setup Security Password</h2>
      <p id="portal-view-desc" style="color: #44526c; font-size: 0.85rem; margin-bottom: 25px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Establish a permanent encryption access password to secure your compliance records.</p>
      
      <div id="timeout-warning-box" style="display: none; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 8px; padding: 16px; text-align: left; margin-bottom: 20px; box-sizing: border-box;">
        <h4 style="color: #991b1b; font-size: 0.85rem; font-weight: 700; margin: 0 0 6px 0;"><i class="fa-solid fa-hourglass-end"></i> Secure Session Expired</h4>
        <p style="color: #7f1d1d; font-size: 0.775rem; margin: 0 0 10px 0; line-height: 1.4;">For your identity protection, this single-use activation panel has timed out after 10 minutes of inactivity.</p>
        <button type="button" id="triggerReverifyBtn" style="background: #991b1b; color: #ffffff; border: none; padding: 8px 12px; font-size: 0.75rem; font-weight: 700; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px;"><i class="fa-solid fa-rotate"></i> Request New Verification Email</button>
      </div>
      
      <form id="passwordResetCommitForm" novalidate>
        <div class="form-group" style="text-align: left; margin-bottom: 16px;">
          <label style="display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: #0a1f44; text-transform: uppercase; letter-spacing: 0.05em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">New Secure Password</label>
          <div class="password-wrapper">
            <input type="password" id="portalUserPassword" required style="width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; outline: none; font-size: 0.9rem;" placeholder="Minimum 8 characters...">
            <i class="fa-solid fa-eye toggle-password-eye" data-target="portalUserPassword"></i>
          </div>
        </div>
        
        <div class="form-group" style="text-align: left; margin-bottom: 20px;">
          <label style="display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: #0a1f44; text-transform: uppercase; letter-spacing: 0.05em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Confirm Secure Password</label>
          <div class="password-wrapper">
            <input type="password" id="portalUserPasswordConfirm" required style="width: 100%; padding: 12px 40px 12px 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; outline: none; font-size: 0.9rem;" placeholder="Re-type password...">
            <i class="fa-solid fa-eye toggle-password-eye" data-target="portalUserPasswordConfirm"></i>
          </div>
        </div>
        
        <div id="reset-status-msg" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; text-align: left; display: none; line-height: 1.4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;"></div>
        <button type="submit" class="btn-login" id="resetSubmitBtn" style="width: 100%; background: #0a1f44; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: background-color 0.2s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">Finalize Profile Registration</button>
      </form>
    </div>
  </div>

  <!-- INTEGRATED PASSWORD EYE VISIBILITY ENGINE -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const eyeIcons = document.querySelectorAll(".toggle-password-eye");
      
      eyeIcons.forEach(icon => {
        icon.addEventListener("click", function () {
          // Identify the target input field through the element attributes data key
          const targetId = this.getAttribute("data-target");
          const inputField = document.getElementById(targetId);
          
          if (inputField) {
            if (inputField.type === "password") {
              inputField.type = "text";
              // Toggle classes safely using the standard DOM token engine list values
              this.classList.remove("fa-eye");
              this.classList.add("fa-eye-slash");
            } else {
              inputField.type = "password";
              this.classList.remove("fa-eye-slash");
              this.classList.add("fa-eye");
            }
          }
        });
      });
    });
  </script>

  <!-- LINK TO LOGIC LAYER EXTERNALLY TO AVOID CUTOFF ERRORS -->
  <script src="assets/js/password-reset-engine.js"></script>
</body>
</html>

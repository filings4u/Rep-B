<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Reset Password | filings4u Portal</title>
    <link rel="stylesheet" href="assets/css/portal-global.css">
    
    <!-- Production Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    <script src="assets/js/supabase-config.js"></script>
    
    <style>
        .form-group input.field-error { border-color: #e53e3e !important; box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.15) !important; }
    </style>
</head>
<body>
    <div class="split-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc;">
        <div class="login-card" style="width: 100%; max-width: 400px; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center;">
            <div class="logo-container" style="margin-bottom: 20px;"><img src="images/logo.png" alt="logo" style="height: 38px;"></div>
            <h2>Recover Password</h2>
            <p style="color: #44526c; font-size: 0.85rem; margin-bottom: 25px;">Enter your registered account email below to receive a secure terminal recovery link.</p>
            
            <form id="forgotPasswordForm" novalidate>
                <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: #0a1f44;">Account Email Address</label>
                    <input type="email" id="resetEmail" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; outline: none;" placeholder="name@company.com">
                </div>
                
                <div id="reset-status-msg" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; text-align: left; display: none;"></div>
                
                <button type="submit" class="btn-login" id="resetSubmitBtn" style="width: 100%; background: #0a1f44; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 700; cursor: pointer;">Send Recovery Link →</button>
            </form>
            
            <div style="margin-top: 20px; font-size: 0.85rem;">
                <a href="portal-login.html" style="color: #10b981; text-decoration: none; font-weight: 700;">← Return to Portal Login</a>
            </div>
        </div>
    </div>

    <!-- RECOVERY TRIGGER HANDLER -->
    <script>
        (async function handlePasswordRecoveryRequest() {
            "use strict";
            const waitForClient = () => new Promise(res => {
                if (window.supabaseClient) return res(window.supabaseClient);
                const idx = setInterval(() => { if (window.supabaseClient) { clearInterval(idx); res(window.supabaseClient); } }, 30);
            });
            const client = await waitForClient();

            const form = document.getElementById('forgotPasswordForm');
            const emailInput = document.getElementById('resetEmail');
            const statusMsg = document.getElementById('reset-status-msg');
            const submitBtn = document.getElementById('resetSubmitBtn');

            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    emailInput.classList.remove('field-error');
                    statusMsg.style.display = 'none';

                    const email = emailInput.value.trim().toLowerCase();
                    if (!email) { emailInput.classList.add('field-error'); return; }

                    submitBtn.innerText = "Dispatching Link...";
                    submitBtn.disabled = true;

                    try {
                        const { error } = await client.auth.resetPasswordForEmail(email, {
                            // 🌐 PRODUCTION REDIRECT: Tells Supabase where to throw them when they click the email link
                            redirectTo: `${window.location.origin}/update-password.html`,
                        });

                        if (error) throw error;

                        statusMsg.style.color = "#10b981";
                        statusMsg.innerText = "✓ Secure recovery link dispatched! Check your email inbox and spam filters to complete the reset.";
                        statusMsg.style.display = 'block';

                    } catch (err) {
                        emailInput.classList.add('field-error');
                        statusMsg.style.color = "#c15254";
                        statusMsg.innerText = `Delivery Blocked: ${err.message}`;
                        statusMsg.style.display = 'block';
                        submitBtn.innerText = "Send Recovery Link →";
                        submitBtn.disabled = false;
                    }
                });
            }
        })();
    </script>
</body>
</html>

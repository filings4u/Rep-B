<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Forgot Password | filings4u</title>
    
    <!-- 🎨 STYLESHEET CHANNELS -->
    <link rel="stylesheet" href="assets/css/portal-global.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    
    <!-- 🚀 JAVASCRIPT ARCHITECTURE PIPELINES -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/wizard-sync.js"></script>
    
    <style>
        /* 🚨 RED GLOW ERROR SHADOW ANIMATION */
        .form-group input.field-error {
            border-color: #e53e3e !important;
            box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.15) !important;
            animation: fieldShake 0.4s ease-in-out;
        }
        
        .form-group input:focus {
            border-color: #10b981 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.08) !important;
        }

        @keyframes fieldShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>
    <div class="split-container" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; padding: 15px; box-sizing: border-box;">
        <div class="login-card" style="width: 100%; max-width: 400px; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 20px 40px rgba(10,31,68,0.06);">
            <div class="logo-container" style="margin-bottom: 20px;">
                <img src="images/logo.png" alt="logo" style="height: 38px;">
            </div>
            <h2>Recover Password</h2>
            <p style="color: #44526c; font-size: 0.85rem; margin-bottom: 25px;">Enter your registered account email below to receive a secure terminal recovery link.</p>
            
            <form id="forgotPasswordForm" novalidate>
                <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; color: #0a1f44; text-transform: uppercase; letter-spacing: 0.05em;">Account Email Address</label>
                    <input type="email" id="resetEmail" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; outline: none; font-size: 0.9rem;" placeholder="name@company.com">
                </div>
                
                <div id="reset-status-msg" style="font-size: 0.8rem; font-weight: 600; margin-bottom: 15px; text-align: left; display: none; line-height: 1.4;"></div>
                
                <button type="submit" class="btn-login" id="resetSubmitBtn" style="width: 100%; background: #0a1f44; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: background-color 0.2s;">Send Recovery Link →</button>
            </form>
            
            <div style="margin-top: 20px; font-size: 0.85rem;">
                <a href="portal-login.html" id="backToLoginLink" style="color: #10b981; text-decoration: none; font-weight: 700;">← Return to Portal Login</a>
            </div>
        </div>
    </div>

    <!-- RECOVERY TRIGGER HANDLER -->
    <script>
    (async function handlePasswordRecoveryRequest() {
        "use strict";

        const waitForClient = () => new Promise(res => {
            if (window.supabaseClient) return res(window.supabaseClient);
            const idx = setInterval(() => {
                if (window.supabaseClient) {
                    clearInterval(idx);
                    res(window.supabaseClient);
                }
            }, 30);
        });

        const client = await waitForClient();
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('resetEmail');
        const statusMsg = document.getElementById('reset-status-msg');
        const submitBtn = document.getElementById('resetSubmitBtn');
        const backLink = document.getElementById('backToLoginLink');

        // 1. Secure absolute URL routing verification fallback
        const verifiedProductionRoot = window.productionRootUrl || window.location.origin;

        if (backLink) {
            backLink.href = `${verifiedProductionRoot}/portal-login.html`;
        }

        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                emailInput.classList.remove('field-error');
                statusMsg.style.display = 'none';

                const email = emailInput.value.trim().toLowerCase();
                if (!email) {
                    emailInput.classList.add('field-error');
                    statusMsg.style.color = "#c15254";
                    statusMsg.innerText = "Please input a valid email address path key.";
                    statusMsg.style.display = 'block';
                    return;
                }

                submitBtn.innerText = "Dispatching Link...";
                submitBtn.disabled = true;

                try {
                    // 2. Clear out any hanging trailing slashes on fallback domains
                    const sanitizedBaseUrl = verifiedProductionRoot.replace(/\/$/, "");
                    const targetRedirectUrl = `${sanitizedBaseUrl}/update-password.html`;

                    console.log("Supabase reset redirect parameters generated:", targetRedirectUrl);

                    const { error } = await client.auth.resetPasswordForEmail(email, {
                        redirectTo: targetRedirectUrl,
                    });

                    if (error) throw error;

                    statusMsg.style.color = "#10b981";
                    statusMsg.innerText = "✓ Secure recovery link dispatched! Check your email inbox and spam filters to complete the reset.";
                    statusMsg.style.display = 'block';
                    
                    submitBtn.innerText = "Link Dispatched ✓";
                    submitBtn.disabled = false;

                } catch (err) {
                    console.error("Supabase Reset Error Logged:", err.message);
                    emailInput.classList.add('field-error');
                    statusMsg.style.color = "#c15254";
                    statusMsg.innerText = `Delivery Blocked: ${err.message}`;
                    statusMsg.style.display = 'block';
                    
                    submitBtn.innerText = "Send Recovery Link →";
                    submitBtn.disabled = false;
                }
            });
        }
    })();
    </script>
</body>
</html>

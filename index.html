<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Login | filings4u Client Portal</title> 

    <!-- 🚀 REPLACE IT EXACTLY WITH THIS VALID VERSIONED PRODUCTION LINK: -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>

    <style> 
        :root { 
            --primary-blue: #0a1f44; 
            --white: #ffffff; 
            --bg-light: #f8f9fa; 
            --border-color: #e2e8f0; 
            --text-gray: #4a5568; 
            --danger-red: #e53e3e; 
        } 
        body, html { 
            margin: 0; 
            height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        } 
        .split-container { 
            display: flex; 
            height: 100vh; 
            width: 100%; 
            overflow: hidden; 
        } 
        .image-side { 
            flex: 1; 
            background: linear-gradient(rgba(10, 31, 68, 0.6), rgba(10, 31, 68, 0.6)), url('images/login-hero.jpg'); 
            background-size: cover; 
            background-position: center; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            padding: 60px; 
            box-sizing: border-box; 
        } 
        .image-content h1 { 
            font-size: 3rem; 
            line-height: 1.2; 
            margin-bottom: 20px; 
        } 
        .image-content p { 
            font-size: 1.1rem; 
            opacity: 0.9; 
            max-width: 500px; 
        } 
        .form-side { 
            flex: 1; 
            background-color: var(--bg-light); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
            box-sizing: border-box; 
            position: relative; 
            height: 100vh; 
            overflow: hidden; 
        } 
        .login-card { 
            width: 100%; 
            max-width: 370px; 
            background: var(--white); 
            padding: 25px 30px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 12px 30px rgba(10,31,68,0.04); 
            text-align: center; 
            z-index: 10; 
            box-sizing: border-box; 
        } 
        .logo-container { 
            margin-bottom: 15px; 
        } 
        .logo-container img { 
            height: 38px; 
        } 
        .login-card h2 { 
            color: var(--primary-blue); 
            font-size: 1.4rem; 
            margin: 0 0 4px 0; 
            font-weight: 700; 
        } 
        .login-card p { 
            color: var(--text-gray); 
            margin-bottom: 20px; 
            font-size: 0.85rem; 
            line-height: 1.4; 
        } 
        .form-group { 
            text-align: left; 
            margin-bottom: 12px; 
        } 
        .form-group label { 
            display: block; 
            font-size: 0.65rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--text-gray); 
            margin-bottom: 5px; 
            letter-spacing: 0.05em; 
        } 
        .form-group input { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            font-size: 0.9rem; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s; 
            color: var(--primary-blue); 
        } 
        .form-group input:focus { 
            border-color: var(--primary-blue); 
            box-shadow: 0 0 0 4px rgba(10, 31, 68, 0.05); 
        } 
        .btn-login { 
            width: 100%; 
            background-color: var(--primary-blue) !important; 
            color: var(--white) !important; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 0.9rem; 
            cursor: pointer; 
            transition: opacity 0.2s; 
            margin-top: 2px; 
            display: block; 
        } 
        .btn-login:hover { 
            opacity: 0.95; 
        } 
        .error-msg { 
            color: var(--danger-red); 
            font-size: 0.75rem; 
            margin-top: 5px; 
            min-height: 1.2em; 
            text-align: left; 
        } 
    </style> 

</head> 
<body> 
<div class="split-container"> 
    <section class="image-side"> 
        <div style="position: absolute; top: 60px; left: 60px; text-align: left;"> 
            <div class="image-content"> 
                <h1>Built for<br>Compliance.</h1> 
                <p>The comprehensive hub for managing all your filings, registrations, and agent services throughout your corporate journey.</p> 
            </div> 
        </div> 
    </section> 
    
    <section class="form-side"> 
        <div class="login-card"> 
            <div class="logo-container"><img src="images/logo.png" alt="filings4u logo"></div> 
            <h2>Portal Login</h2> 
            <p>Please enter your credentials to access your secure dashboard.</p> 
            
            <!-- 🚀 HARDENED COMPONENT IDs MATRIX -->
            <form id="loginForm"> 
                <div class="form-group"> 
                    <label for="email">Email Address</label> 
                    <!-- FIXED: Added explicit ID attribute matching the script hooks -->
                    <input type="email" id="email" required autocomplete="email"> 
                </div> 
                <div class="form-group"> 
                    <label for="password">Password</label> 
                    <!-- FIXED: Added explicit ID attribute matching the script hooks -->
                    <input type="password" id="password" required autocomplete="current-password"> 
                    <div id="password-error" class="error-msg"></div> 
                </div> 
                
                <div style="margin-bottom:12px; font-size:0.8rem; color:#64748b; padding:10px; border:1px dashed #e2e8f0; border-radius:6px; text-align:center;">
                    🛡️ Security Handshake Active
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">Enter Secure Portal →</button> 
            </form> 
            
            <div style="margin-top: 20px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; padding: 0 2px;"> 
                <a href="reset-password.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Forgot Password?</a> 
                <span style="color: var(--text-gray); font-weight: 500;">Paid Account Gate</span> 
            </div> 
        </div> 
    </section> 
</div> 

<script> 
// 🚀 PRODUCTION UPDATE: Replaced the slow window 'load' loop with an immediate execution block
var authSupabaseClient = null; 

try { 
    // ⚡ This now fires instantly at line-read, making the database connection ready before you can even type!
    authSupabaseClient = window.supabase.createClient( 
        'https://lrbimrlbskjweynxlgas.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU' 
    ); 
    window.authSupabaseClient = authSupabaseClient;
    console.log("⚡ Supabase Connection successfully established at line-read thresholds.");
} catch (err) { 
    console.error("Supabase engine failed to initialize:", err); 
} 

// Keep your existing form element selector tags right beneath it
const loginForm = document.getElementById('loginForm'); 
const loginSubmitBtn = document.getElementById('loginBtn'); 
const passError = document.getElementById('password-error');


if (loginForm) { 
    loginForm.onsubmit = async function(e) { 
        e.preventDefault(); 
        
        const client = window.authSupabaseClient || window.supabase; 
        if (!client) { 
            alert("Database initializing. Click enter again in a moment."); 
            return; 
        } 
        
        const email = document.getElementById('email').value.trim(); 
        const password = document.getElementById('password').value; 
        
        if (loginSubmitBtn) { 
            loginSubmitBtn.innerText = "Authenticating Enterprise..."; 
            loginSubmitBtn.disabled = true; 
        } 
        if (passError) passError.innerText = ""; 

        try { 
            console.log("Dispatching verification request for:", email);
            const result = await client.auth.signInWithPassword({ email, password }); 

            if (result.error) { 
                console.warn("Auth rejected:", result.error.message);
                if (passError) { 
                    passError.style.color = "var(--danger-red)"; 
                    passError.innerText = `Login Failed: ${result.error.message}`; 
                } 
                if (loginSubmitBtn) { 
                    loginSubmitBtn.innerText = "Enter Secure Portal →"; 
                    loginSubmitBtn.disabled = false; 
                } 
            } else { 
                console.log("Auth verified by server. Mapping routing destinations...");
                
                // 🚀 OWNER EMAIL DIRECT BYPASS GATEWAY:
                if (email.toLowerCase() === 'filings@filings4u.com') { 
                    window.location.href = 'admin-dashboard.html'; 
                    return; 
                } 
                
                const { data: profile } = await client 
                    .from('profiles') 
                    .select('role') 
                    .eq('id', result.data.user.id) 
                    .maybeSingle(); 
                    
                if (profile && profile.role === 'admin') { 
                    window.location.href = 'admin-dashboard.html'; 
                } else { 
                    const currentParams = new URLSearchParams(window.location.search); 
                    const targetService = currentParams.get('service'); 
                    const targetPlan = currentParams.get('plan') || 'compliance'; 
                    
                    if (targetService) { 
                        window.location.href = `wizard.html?service=${targetService}&plan=${targetPlan}`; 
                    } else { 
                        window.location.href = 'portal-dashboard.html'; 
                    } 
                } 
            } 
        } catch (err) { 
            console.error("Critical login submission block crash:", err); 
            if (loginSubmitBtn) { 
                loginSubmitBtn.innerText = "Enter Secure Portal →"; 
                loginSubmitBtn.disabled = false; 
            } 
        } 
    }; 
} 
</script> 
</body> 
</html>

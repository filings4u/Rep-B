<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | filings4u Client Portal</title>
    <!-- 1. External Scripts -->
    <script src="https://hcaptcha.com" async defer></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        /* PULLING FROM YOUR PORTAL STYLES */
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--white);
        }

        /* BRAND SIDE (LEFT) */
        .brand-side {
            flex: 1.2;
            background-color: var(--primary-blue);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }

        /* Subtle truck-style background pattern or image can go here */
        .brand-side::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('images/truck-bg.jpg'); /* Optional background */
            opacity: 0.1;
            z-index: 0;
        }

        .brand-content { position: relative; z-index: 1; }
        .brand-logo { height: 50px; margin-bottom: 40px; }
        .brand-side h1 { font-size: 2.8rem; margin: 0 0 20px 0; line-height: 1.2; }
        .brand-side p { font-size: 1.1rem; color: #cbd5e1; max-width: 450px; line-height: 1.6; }

        /* FORM SIDE (RIGHT) */
        .form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-color: #fcfcfc;
        }

        .login-box { width: 100%; max-width: 400px; }
        .login-box h2 { color: var(--primary-blue); font-size: 2rem; margin: 0 0 10px 0; }
        .login-box p { color: var(--text-gray); margin-bottom: 35px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: var(--text-gray); 
            margin-bottom: 8px; 
        }
        .form-group input { 
            width: 100%; 
            padding: 14px 15px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 1rem; 
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus { border-color: var(--primary-blue); }

        .error-msg { color: var(--danger-red); font-size: 0.85rem; margin-top: 5px; min-height: 1.2em; }

        .btn-login {
            width: 100%;
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        .btn-login:hover { opacity: 0.9; }

        @media (max-width: 1024px) {
            .brand-side { display: none; }
        }
    </style>
</head>
<body>

    <section class="brand-side">
        <div class="brand-content">
            <img src="images/logo-white.png" alt="filings4u" class="brand-logo">
            <h1>Compliance is <br>now effortless.</h1>
            <p>Your centralized hub for permits, registrations, and registered agent services. Built specifically for transportation professionals.</p>
        </div>
    </section>

    <section class="form-side">
        <div class="login-box">
            <h2>Welcome back</h2>
            <p>Please enter your credentials to access your portal.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                    <div id="email-error" class="error-msg"></div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <div id="password-error" class="error-msg"></div>
                </div>

                <!-- hCaptcha Security -->
                <div class="h-captcha" data-sitekey="961cfd8a-525a-4b60-9c0c-dd6c506e9fc4"></div>
                <div id="captcha-error" class="error-msg"></div>

                <button type="submit" class="btn-login" id="loginBtn">Enter Secure Portal →</button>
            </form>

            <div style="margin-top: 30px; text-align: center; font-size: 0.9rem;">
                <a href="forgot-password.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Forgot Password?</a>
            </div>
        </div>
    </section>

    <script>
        // 1. Supabase Config
        const supabase = supabase.createClient('https://supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU');

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaToken = hcaptcha.getResponse();

            // Clear errors
            document.getElementById('password-error').innerText = '';
            document.getElementById('captcha-error').innerText = '';

            if (!captchaToken) {
                document.getElementById('captcha-error').innerText = "Please complete security check.";
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            // 2. Sign In
            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password,
                options: { captchaToken }
            });

            if (error) {
                document.getElementById('password-error').innerText = "Invalid credentials. Please try again.";
                btn.innerText = "Enter Secure Portal →";
                btn.disabled = false;
                hcaptcha.reset();
            } else {
                // 3. THE ROUTER: Send them to their specific dashboard
                const purchaseType = data.user.user_metadata.purchase_type || 'general';
                
                const routes = {
                    'trucker': 'portal-trucker.html',
                    'broker': 'portal-broker.html',
                    'formation': 'portal-formation.html'
                };

                window.location.href = routes[purchaseType] || 'portal-dashboard.html';
            }
        };
    </script>
</body>
</html>

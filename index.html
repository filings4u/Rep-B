<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | filings4u Client Portal</title>
    <!-- External Scripts -->
    <script src="https://hcaptcha.com" async defer></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
        }

        body, html {
            margin: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .split-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* LEFT SIDE: EQUAL IMAGE PANEL */
        .image-side {
            flex: 1;
            background: linear-gradient(rgba(10, 31, 68, 0.6), rgba(10, 31, 68, 0.6)), 
                        url('images/truck-bg.jpg'); /* Ensure this image path is correct */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 60px;
            box-sizing: border-box;
        }

        .image-content h1 {
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .image-content p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 500px;
        }

        /* RIGHT SIDE: EQUAL FORM PANEL */
        .form-side {
            flex: 1;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--white);
            padding: 50px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo-container img {
            height: 50px;
            margin-bottom: 30px;
        }

        .login-card h2 {
            color: var(--primary-blue);
            font-size: 1.8rem;
            margin: 0 0 10px 0;
        }

        .login-card p {
            color: var(--text-gray);
            margin-bottom: 35px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-gray);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(10, 31, 68, 0.05);
        }

        .error-msg {
            color: var(--danger-red);
            font-size: 0.85rem;
            margin-top: 5px;
            min-height: 1.2em;
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            opacity: 0.95;
        }

        /* Responsive: Stack on mobile */
        @media (max-width: 1024px) {
            .split-container { flex-direction: column; }
            .image-side { display: none; }
            .form-side { height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="split-container">
        <!-- LEFT SIDE -->
        <section class="image-side">
            <div class="image-content">
                <h1>Built for<br>Compliance.</h1>
                <p>Manage your trucking authority, fleet permits, and filings in one secure, industry-leading platform.</p>
            </div>
        </section>

        <!-- RIGHT SIDE -->
        <section class="form-side">
            <div class="login-card">
                <div class="logo-container">
                    <img src="images/logo.png" alt="filings4u logo">
                </div>
                <h2>Portal Login</h2>
                <p>Please enter your credentials to access your secure dashboard.</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="name@company.com" required>
                        <div id="email-error" class="error-msg"></div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <div id="password-error" class="error-msg"></div>
                    </div>

                    <!-- hCaptcha -->
                    <div class="h-captcha" data-sitekey="961cfd8a-525a-4b60-9c0c-dd6c506e9fc4"></div>
                    <div id="captcha-error" class="error-msg"></div>

                    <button type="submit" class="btn-login" id="loginBtn">Enter Secure Portal →</button>
                </form>

                <div style="margin-top: 25px; font-size: 0.9rem;">
                    <a href="forgot-password.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Forgot Password?</a>
                </div>
            </div>
        </section>
    </div>

    <script>
        // Supabase Initialization
        const supabase = supabase.createClient('https://supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU');

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaToken = hcaptcha.getResponse();

            document.getElementById('password-error').innerText = '';
            document.getElementById('captcha-error').innerText = '';

            if (!captchaToken) {
                document.getElementById('captcha-error').innerText = "Please complete security check.";
                return;
            }

            btn.innerText = "Authenticating...";
            btn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password,
                options: { captchaToken }
            });

            if (error) {
                document.getElementById('password-error').innerText = "Invalid credentials. Please try again.";
                btn.innerText = "Enter Secure Portal →";
                btn.disabled = false;
                hcaptcha.reset();
            } else {
                const purchaseType = data.user.user_metadata.purchase_type || 'general';
                const routes = {
                    'trucker': 'portal-trucker.html',
                    'broker': 'portal-broker.html',
                    'formation': 'portal-formation.html'
                };
                window.location.href = routes[purchaseType] || 'portal-dashboard.html';
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Notifications Hub | filings4u</title>
  
  <link rel="stylesheet" href="assets/css/portal-wizard.css">
  <link rel="stylesheet" href="assets/css/notifications-center.css">
  <link rel="icon" type="image/png" href="images/fav.png">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #f8fafc; margin:0; padding:15px; font-family: system-ui, -apple-system, sans-serif;">

  <main class="wizard-container" style="max-width: 850px; margin: 30px auto; background: #ffffff; padding: 40px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.01);">
    
    <!-- Action Header Bar Component -->
    <div style="border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
      <div>
        <img src="images/logo.png" alt="filings4u" style="height: 32px; display:block; margin-bottom:8px;">
        <h1 style="margin:0; font-size:1.5rem; color:#0a1f44; font-weight:800;">Compliance Notifications Channel</h1>
      </div>
      <div style="display:flex; gap:12px;">
        <button onclick="executeMarkAllNotificationsAsRead()" class="btn-mark-read-action" style="padding:10px 16px;">✓ Mark All As Read</button>
        <button onclick="window.history.back()" style="background:transparent; border:1px solid #0a1f44; color:#0a1f44; padding:10px 16px; border-radius:6px; font-weight:600; font-size:0.85rem; cursor:pointer;">← Return to Dashboard</button>
      </div>
    </div>

    <!-- Live Sync Timeline Stream List Box -->
    <div class="notifications-stream-canvas">
      <div id="notificationsStreamLoadingSpinner" style="text-align:center; padding:40px; color:#64748b; font-weight:600;">
        Connecting live real-time notification node matrices...
      </div>
      <!-- Safe Javascript Row Injection Target Anchor -->
      <div id="notificationsStreamTimelineInjectionTarget"></div>
    </div>

  </main>

  <!-- UNIFIED DESK LISTENER LOGIC ENGINE -->
  <script src="assets/js/notifications-engine.js"></script>
</body>
</html>

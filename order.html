<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | filings4u</title>
    <!-- Core layout style engine links system mapping -->
    <link rel="stylesheet" href="assets/css/portal-wizard.css">
    <!-- PRODUCTION CDN INFRASTRUCTURE -->
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/wizards-config.js"></script>
    <style>
        :root {
            --emerald: #10b981;
            --navy: #0a1f44;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Dynamic full-width alignment modifiers for Stripe Shadow tree elements */
        #checkout {
            margin-top: 20px;
            min-height: 500px;
            width: 100% !important;
            max-width: 100% !important;
            box-sizing: border-box;
        }
        #checkout iframe {
            width: 100% !important;
            min-width: 100% !important;
            max-width: 100% !important;
        }
    </style>
    <script type="module" src="assets/js/portal-global.js" defer></script>
</head>
<body class="portal-body" style="background-color: #f8fafc; margin:0; padding:20px; font-family: system-ui, -apple-system, sans-serif;">
    
    <!-- 🚀 STRETCHED: Removed 800px constraint and centering to span full view width like success.html -->
    <main class="wizard-container" style="max-width: 100%; width: 100%; box-sizing: border-box; background: #ffffff; padding: 40px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.02);">
        
        <!-- Interactive Layout Frame Header -->
        <div style="border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <img src="images/logo.png" alt="filings4u" style="height: 32px; display:block; margin-bottom:8px;">
                <h1 style="margin:0; font-size:1.5rem; color:#0a1f44; font-weight:800;">Secure Checkout Gateway</h1>
            </div>
            <button onclick="window.location.href='portal-dashboard.html'" style="background:transparent; border:1px solid #0a1f44; color:#0a1f44; padding:8px 16px; border-radius:6px; font-weight:600; font-size:0.85rem; cursor:pointer;">Dashboard Return ➔</button>
        </div>

        <!-- DYNAMIC STEP COMPONENT INJECTION CONTAINER -->
        <div id="checkout-form-fields-box" style="min-height: 250px; width: 100%;">
            <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:25px; margin-bottom:30px;">
                <h3 style="margin:0 0 15px 0; font-size:1rem; color:#0a1f44; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;">Order Context Summary</h3>
                <p style="margin:0 0 8px 0; font-size:0.88rem; color:#64748b;">Filing Entity Name: <strong id="summary-company-name" style="color:#0a1f44;">Loading...</strong></p>
                <p style="margin:0; font-size:0.88rem; color:#64748b;">Filing Fee Due: <strong id="summary-price-display" style="color:#0a1f44;">$0.00</strong></p>
            </div>

            <!-- LOADING HANDSHAKE OVERLAY -->
            <div id="loading-message" style="text-align: center; padding: 40px;">
                <p style="color:#64748b; font-size: 0.95rem; margin-bottom: 15px;">Initializing secure handshake validation layer...</p>
                <div style="margin: 0 auto; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>

            <!-- STRIPE MOUNT POINT -->
            <div id="checkout"></div>
        </div>
    </main>

    <!-- AUTOMATION CONTROLLER ENGINE -->
    <script>
        window.addEventListener('load', async () => {
            const loadingMessage = document.getElementById('loading-message');
            const stripeKey = 'pk_test_51TTy4u1hrjQxq47MgsMyTpdS4Aadnk4H63kILJaWbuUfppSySDt4Ijx9we7zkkCFEaeqzQ7C3k7Ql9HcSA5Urh3n00pEKGxNLE';

            if (typeof Stripe === 'undefined') {
                loadingMessage.innerHTML = "<div style='color:red; font-weight:700;'>Stripe engine script failed to mount securely.</div>";
                return;
            }

            const stripe = Stripe(stripeKey);
            const rawData = sessionStorage.getItem('pendingOrder');

            if (!rawData) {
                loadingMessage.innerHTML = "<div style='color:red; font-weight:700;'>Session Expired or Missing Context Records.</div>";
                setTimeout(() => { window.location.href = "portal-dashboard.html"; }, 2500);
                return;
            }

            const orderData = JSON.parse(rawData);
            const validCompanyName = orderData.company_name || 'Registration Profile';
            const validPriceValue = orderData.price ? parseFloat(orderData.price) : 0.00;

            document.getElementById('summary-company-name').innerText = validCompanyName;
            document.getElementById('summary-price-display').innerText = `$${validPriceValue.toFixed(2)}`;

            try {
                const fetchClientSecret = async () => {
                    const currentOriginUrl = window.location.origin;
                    const response = await fetch('https://lrbimrlbskjweynxlgas.supabase.co/functions/v1/stripe-webhook', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({
                            action: 'checkout',
                            email: orderData.customer_email || 'guest-checkout@filings4u.com',
                            company_name: validCompanyName,
                            amount: Math.round(validPriceValue * 100),
                            service_type: orderData.plan || 'trucker',
                            return_url: `${currentOriginUrl}/success.html?session_id={CHECKOUT_SESSION_ID}`,
                            success_url: `${currentOriginUrl}/success.html?session_id={CHECKOUT_SESSION_ID}`
                        })
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Server status ${response.status}: ${errorText}`);
                    }

                    const data = await response.json();
                    if (data.error) throw new Error(data.error);
                    return data.clientSecret;
                };

                const checkout = await stripe.initEmbeddedCheckout({ fetchClientSecret });
                loadingMessage.style.display = 'none';
                checkout.mount('#checkout');
                console.log("Stripe embedded form successfully canvas mounted.");

            } catch (err) {
                console.error("Initialization failed:", err);
                loadingMessage.innerHTML = `<div style="color:red; font-weight:700;">Handshake Connection Error: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment Checkout | filings4u</title>
    <link rel="stylesheet" href="assets/css/portal-wizard.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/wizards-config.js"></script>
    <style>
        :root { --emerald: #10b981; --navy: #0a1f44; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #checkout { margin-top: 20px; min-height: 450px; width: 100% !important; max-width: 100% !important; box-sizing: border-box; }
        #checkout iframe { width: 100% !important; min-width: 100% !important; max-width: 100% !important; }
        .trust-badge { background: rgba(16, 185, 129, 0.1); padding: 10px 20px; border-radius: 8px; font-size: 0.75rem; color: var(--navy); font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .trust-badge span { color: var(--emerald); font-weight: 800; }
    </style>
</head>
<body style="background-color: #f8fafc; margin:0; padding:20px; font-family: system-ui, -apple-system, sans-serif;">

    <main class="wizard-container" style="max-width: 850px; margin: 40px auto; background: #ffffff; padding: 40px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: relative;">
        
        <!-- Live System Clock Dashboard Component -->
        <div style="position: absolute; top: 15px; right: 40px; text-align: right;">
            <div id="live-wizard-date" style="font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;">--/--/----</div>
            <div id="live-wizard-clock" style="font-family: monospace; font-size: 0.95rem; font-weight: 800; color: var(--emerald); margin-top: 2px;">00:00:00</div>
        </div>

        <!-- Layout Frame Header Component -->
        <div style="border-bottom: 1px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 30px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <img src="images/logo.png" alt="filings4u" style="height: 32px; display:block; margin-bottom:8px;">
                <h1 style="margin:0; font-size:1.5rem; color:#0a1f44; font-weight:800;">Secure Checkout Gateway</h1>
            </div>
            <button onclick="handleCancelAbortRedirect()" style="background:transparent; border:1px solid #0a1f44; color:#0a1f44; padding:8px 16px; border-radius:6px; font-weight:600; font-size:0.85rem; cursor:pointer;">✕ Abort & Return</button>
        </div>

        <!-- Line Item Breakdowns Box Viewport Container -->
        <div style="margin: 20px 0; width: 100%; box-sizing: border-box; text-align: left;">
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 25px; margin-bottom: 30px;">
                <p style="margin: 0 0 10px 0; font-size: 1rem; color: #4a5568;">
                    Filing Contact Email: <strong id="summary-customer-email" style="color: #0a1f44;">Loading...</strong>
                </p>
                <p style="margin: 0 0 10px 0; font-size: 1rem; color: #4a5568;">
                    Filing Corporate Entity: <strong id="summary-company-name" style="color: #0a1f44;">Loading...</strong>
                </p>
                <p style="margin: 0; font-size: 1rem; color: #4a5568; border-top: 1px dashed #e2e8f0; padding-top: 12px; margin-top: 12px;">
                    Total Unified Amount Due: <strong id="summary-price-display" style="color: var(--emerald); font-size: 1.2rem;">$0.00</strong>
                </p>
            </div>

            <!-- Loading Spinner Hub Component -->
            <div id="loading-message" style="text-align: center; padding: 60px 0;">
                <p style="color: #4a5568; font-size: 0.95rem; margin-bottom: 15px;">Establishing secure encrypted connection layer parameters...</p>
                <div style="margin: 0 auto; width: 35px; height: 35px; border: 3px solid #f3f3f3; border-top: 3px solid #10b981; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>

            <!-- Stripe Element Target Placement Anchor -->
            <div id="checkout"></div>
        </div>

        <!-- Secure Connection Footer Badging -->
        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; width: 100%;">
            <div class="trust-badge">
                <span>SECURE</span> 256-bit SSL Encrypted Connection
            </div>
            <div style="font-size: 0.8rem; color: #64748b; font-weight: 500; text-align: right;">
                PCI-DSS Compliant Transaction Pipeline
            </div>
        </div>
    </main>

 <script>
// System Clock Tick Driver
(function() {
  function updateCheckoutClock() {
    const clockBox = document.getElementById('live-wizard-clock');
    const dateBox = document.getElementById('live-wizard-date');
    const rightNow = new Date();
    if (clockBox) clockBox.innerText = rightNow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    if (dateBox) dateBox.innerText = rightNow.toLocaleDateString([], { month: 'short', day: '2-digit', year: 'numeric' });
  }
  updateCheckoutClock();
  setInterval(updateCheckoutClock, 1000);
})();

// Primary Core Extraction Matrix Handoff Loader
document.addEventListener('DOMContentLoaded', async () => {
  const loadingMessage = document.getElementById('loading-message');
  const stripeKey = 'pk_live_51TTy4i0dNjSlvyScbq19wWCQjOhDKdFMUzkV4Et4ok1NAWFFab4qV2KyZB5CwAp6dAvpLSuMZq2xKAR3BZ1gfuTM00KtmvEgc4';
  
  const rawData = sessionStorage.getItem('pendingOrder');
  if (!rawData) {
    loadingMessage.innerHTML = "<div style='color:#0a1f44; font-weight:700;'>Session records empty. Redirecting to form configurations launcher...</div>";
    setTimeout(() => { window.location.href = "https://filings4u.com"; }, 1500);
    return;
  }

  const orderData = JSON.parse(rawData);
  const guestEmail = orderData.customer_email || 'guest-checkout@filings4u.com';
  const validCompanyName = orderData.company_name || 'Registration Profile';
  const validPriceValue = orderData.price ? parseFloat(orderData.price) : 0.00;

  document.getElementById('summary-customer-email').innerText = guestEmail;
  document.getElementById('summary-company-name').innerText = validCompanyName;
  document.getElementById('summary-price-display').innerText = `$${validPriceValue.toFixed(2)}`;

  try {
    const cleanEscapedEmail = encodeURIComponent(guestEmail);
    
    // 1. Initialize Stripe object using your public live key
    const stripe = await loadStripe(stripeKey);

    // 2. Safely call your Edge Function to generate the live session client secret
    const response = await fetch('https://lrbimrlbskjweynxlgas.supabase.co/functions/v1/stripe-webhook', {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({
        action: 'checkout',
        email: guestEmail,
        company_name: validCompanyName,
        amount: Math.round(validPriceValue * 100),
        service_type: orderData.plan || 'llc-formation-compliance',
        // 🚀 FIXED: Added ?email= formatting to prevent server-side URL crashes
        return_url: 'https://filings4u.com' + cleanEscapedEmail + '&session_id={CHECKOUT_SESSION_ID}'
      })
    });

    if (!response.ok) throw new Error(`Server edge gateway response failure status: ${response.status}`);
    const jsonPayload = await response.json();
    if (jsonPayload.error) throw new Error(jsonPayload.error);
    if (!jsonPayload.clientSecret) throw new Error("No client secret returned from backend.");

    // 3. 🚀 FIXED: Correctly pass the resolved clientSecret string straight into the frame initializer [1]
    const checkout = await stripe.initEmbeddedCheckout({
      clientSecret: jsonPayload.clientSecret
    });

    // 4. Hide loader element and mount the payment interface container
    loadingMessage.style.display = 'none';
    checkout.mount('#checkout');

  } catch (err) {
    console.error("Stripe runtime connection crash error:", err);
    loadingMessage.innerHTML = `<div style="color:#e53e3e; font-weight:700;">Handshake Secure Tunnel Interrupted: <br><span style="font-size:0.85rem; font-weight:400; color:#4a5568;">${err.message}</span></div>`;
  }
});

function handleCancelAbortRedirect() {
  if (confirm("Are you sure you want to discard your registration selections and return to the main hub?")) {
    window.location.href = 'https://filings4u.com';
  }
}
</script>

</body>
</html>

 <script>
// System Clock Tick Driver
(function() {
    function updateCheckoutClock() {
        const clockBox = document.getElementById('live-wizard-clock');
        const dateBox = document.getElementById('live-wizard-date');
        const rightNow = new Date();
        if (clockBox) clockBox.innerText = rightNow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        if (dateBox) dateBox.innerText = rightNow.toLocaleDateString([], { month: 'short', day: '2-digit', year: 'numeric' });
    }
    updateCheckoutClock();
    setInterval(updateCheckoutClock, 1000);
})();

// Primary Core Extraction Matrix Handoff Loader
document.addEventListener('DOMContentLoaded', async () => {
    const loadingMessage = document.getElementById('loading-message');
    const stripeKey = 'pk_live_51TTy4i0dNjSlvyScbq19wWCQjOhDKdFMUzkV4Et4ok1NAWFFab4qV2KyZB5CwAp6dAvpLSuMZq2xKAR3BZ1gfuTM00KtmvEgc4';
    
    // 📦 READ SECURE TRANSFERRED SALES PAGE PAYLOADS
    const rawData = sessionStorage.getItem('pendingOrder');
    if (!rawData) {
        loadingMessage.innerHTML = "<div style='color:#0a1f44; font-weight:700;'>Session records empty. Redirecting to form configurations launcher...</div>";
        setTimeout(() => {
            window.location.href = "https://filings4u.com";
        }, 1500);
        return;
    }

    const orderData = JSON.parse(rawData);
    const guestEmail = orderData.customer_email || 'guest-checkout@filings4u.com';
    const validCompanyName = orderData.company_name || 'Registration Profile';
    const validPriceValue = orderData.price ? parseFloat(orderData.price) : 0.00;

    // Hydrate UI Instantaneously
    document.getElementById('summary-customer-email').innerText = guestEmail;
    document.getElementById('summary-company-name').innerText = validCompanyName;
    document.getElementById('summary-price-display').innerText = `$${validPriceValue.toFixed(2)}`;

    try {
        if (typeof window.Stripe === 'undefined') {
            throw new Error("Stripe script library not detected. Please verify your network script links.");
        }
        
        const stripe = window.Stripe(stripeKey);
        const cleanEscapedEmail = encodeURIComponent(guestEmail);
        
        // 🔒 SECURE HOOK: Public anon token to clear the 401 Gateway Wall completely
        const projectAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU';
        
        // Build valid structured redirection query pathing
        const structuralReturnUrl = 'https://filings4u.com' + cleanEscapedEmail + '&session_id={CHECKOUT_SESSION_ID}';

        // Route request parameter endpoint directly to your stripe-checkout initialization engine
        const response = await fetch('https://lrbimrlbskjweynxlgas.supabase.co/functions/v1/stripe-checkout', {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json',
                'Authorization': 'Bearer ' + projectAnonKey
            },
            body: JSON.stringify({
                action: 'checkout',

                amount: Math.round(validPriceValue * 100),
                service_type: orderData.plan || 'llc-formation-compliance',

        });

        if (!response.ok) {
            throw new Error(`Server edge gateway response failure status: ${response.status}`);
        }

        const jsonPayload = await response.json();
        if (jsonPayload.error) throw new Error(jsonPayload.error);
        if (!jsonPayload.clientSecret) throw new Error("No client secret returned from backend.");

        // Initialize and mount Embedded Checkout container
        const checkout = await stripe.initEmbeddedCheckout({ 
            clientSecret: jsonPayload.clientSecret 
        });
        
        loadingMessage.style.display = 'none';
        checkout.mount('#checkout');

    } catch (err) {
        console.error("Stripe runtime connection crash error:", err);

});

function handleCancelAbortRedirect() {

}

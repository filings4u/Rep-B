<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway Checkout Checkout | filings4u</title>
    <link rel="stylesheet" href="assets/css/portal-global.css">
</head>
<body class="portal-body">
    <main style="max-width: 550px; margin: 80px auto; padding: 0 20px; font-family: sans-serif; box-sizing: border-box;">
        <div style="background: #ffffff; border-radius: 12px; padding: 40px; box-shadow: 0 10px 30px rgba(10, 31, 68, 0.08); border: 1px solid #e2e8f0;">
            
            <h2 style="color: #0a1f44; margin: 0 0 5px 0; font-weight: 800; font-size: 1.5rem;">Secure Checkout</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin: 0 0 30px 0;">Complete payment routing sequence parameters safely.</p>
            
            <!-- Summary Review Context Window Callout Section -->
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span style="display: block; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: #64748b; letter-spacing: 0.5px;">Filing Order Balance</span>
                    <strong id="checkout-item-label" style="font-size: 1rem; color: #0a1f44;">Filing Package</strong>
                </div>
                <div id="checkout-amount-display" style="font-size: 1.5rem; font-weight: 900; color: #0a1f44;">$0.00</div>
            </div>

            <!-- Standard Credit Form Processing Inputs Frame Container Node -->
            <form onsubmit="executePaymentPipeline(event);">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #0a1f44; margin-bottom: 8px;">Cardholder Name</label>
                    <input type="text" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #0a1f44; margin-bottom: 8px;">Credit Card Number</label>
                    <input type="text" maxlength="19" placeholder="•••• •••• •••• ••••" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; letter-spacing: 1px;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #0a1f44; margin-bottom: 8px;">Expiration</label>
                        <input type="text" maxlength="5" placeholder="MM/YY" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; text-align: center;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #0a1f44; margin-bottom: 8px;">CVV</label>
                        <input type="password" maxlength="4" placeholder="•••" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; text-align: center;">
                    </div>
                </div>

                <button type="submit" style="background: #10b981; color: white; border: none; width: 100%; padding: 16px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); transition: background 0.2s;">Authorize & Pay Security Balance</button>
            </form>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const totalPrice = sessionStorage.getItem("checkout_total_price") || "0.00";
            const serviceKey = sessionStorage.getItem("checkout_service_key") || "General Order";
            
            document.getElementById('checkout-amount-display').innerText = `$${totalPrice}`;
            document.getElementById('checkout-item-label').innerText = `Service ID: Code-${serviceKey.toUpperCase()}`;
        });

        function executePaymentPipeline(event) {
            event.preventDefault();
            // Optional API processing calls/Supabase record updates go here...
            window.location.href = "success.html";
        }
    </script>
</body>
</html>

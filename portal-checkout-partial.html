<!-- PARTAL-PAYMENT CHECKOUT COMPONENT -->
<div class="portal-card" style="border: 2px solid #0a1f44;">
    <h3 style="margin-bottom: 20px;">Secure Checkout</h3>
    
    <!-- WALLET APPLICATION BOX -->
    <div id="wallet-application" style="background: #f0fdf4; border: 1px solid #10b981; padding: 20px; border-radius: 8px; margin-bottom: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <strong style="color: #166534; display: block;">Portal Credit Applied</strong>
                <span style="font-size: 0.85rem; color: #475569;">You have <strong>$142.50</strong> available in your wallet.</span>
            </div>
            <div style="text-align: right;">
                <span style="font-weight: 800; color: #166534;">-$142.50</span>
            </div>
        </div>
    </div>

    <!-- FINAL TOTAL CALCULATION -->
    <div style="margin-bottom: 30px; padding: 0 10px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #64748b;">
            <span>Order Subtotal</span>
            <span>$999.00</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 800; color: #0a1f44; padding-top: 15px; border-top: 2px solid #f1f5f9;">
            <span>Remaining Balance</span>
            <span style="color: #ff6b00;">$856.50</span>
        </div>
        <p style="font-size: 0.75rem; color: #64748b; margin-top: 5px;">Your primary card <strong>VISA **** 4242</strong> will be charged for the remaining balance.</p>
    </div>

    <!-- STRIPE ATTEMPT BUTTON -->
    <button class="btn-primary-small" style="width: 100%; height: 55px; font-size: 1.1rem;" onclick="processPartialPayment()">
        Complete Payment ($856.50)
    </button>
</div>

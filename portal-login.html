<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <title>Login | filings4u Client Portal</title>
    <link rel="stylesheet" href="assets/css/portal-global.css">
    
    <!-- 1. PRODUCTION CDN ENGINE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    
    <!-- 2. CENTRALIZED APPLICATION ROUTER WRAPPER -->
    <script src="assets/js/supabase-config.js"></script>
    
    <!-- 3. CUSTOMER PORTAL INTERACTION LAYER -->
    <script src="assets/js/portal-login.js"></script>

    <!-- 🎨 HERO IMAGE BACKGROUND LAYER CONFIGURATION -->
    <style>
        .image-side {
            background: linear-gradient(rgba(10, 31, 68, 0.8), rgba(16, 185, 129, 0.8)), url('images/login-hero.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        .image-content h1 {
            color: #ffffff;
            font-size: 3rem;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 800;
        }
        .image-content p {
            color: #ffffff;
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 500px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="split-container">
        <!-- LEFT SIDE: BRANDING PANEL WITH HERO BACKGROUND IMAGE -->
        <section class="image-side">
            <div style="position: absolute; top: 60px; left: 60px; text-align: left;">
                <div class="image-content">
                    <h1>Built for<br>Compliance.</h1>
                    <p>The comprehensive hub for managing all your filings, registrations, and agent services throughout your corporate journey.</p>
                </div>
            </div>
        </section>

        <!-- RIGHT SIDE: INTERACTIVE CONTROL FORM -->
        <section class="form-side">
            <div class="login-card">
                <div class="logo-container"><img src="images/logo.png" alt="filings4u logo"></div>
                <h2>Portal Login</h2>
                <p>Please enter your credentials to access your secure dashboard.</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required autocomplete="current-password">
                        <div id="password-error" class="error-msg"></div>
                    </div>
                    <div style="margin-bottom:12px; font-size:0.8rem; color:#64748b; padding:10px; border:1px dashed #e2e8f0; border-radius:6px; text-align:center;">
                        🛡️ Security Handshake Active
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">Enter Secure Portal →</button>
                </form>
                
                <div style="margin-top: 20px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; padding: 0 2px;">
                    <a href="reset-password.html" style="color: #0a1f44; text-decoration: none; font-weight: 600;">Forgot Password?</a>
                    <span style="color: #44526c; font-weight: 500;">Paid Account Gate</span>
                </div>
            </div>
        </section>
    </div>
</body>
</html>

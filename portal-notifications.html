<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications Hub | filings4u</title>
    <link rel="stylesheet" href="assets/css/portal-global.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
    <!-- 1. IDENTICAL SIDEBAR LAYOUT FRAME -->
    <aside class="portal-sidebar">
        <div class="sidebar-logo">
            <img src="images/logo.png" alt="filings4u" style="height: 35px;">
        </div>
        <nav class="sidebar-nav">
            <a href="portal-dashboard.html" class="nav-link">🎛️ Dashboard</a>
            <a href="portal-notifications.html" class="nav-link active" style="background:#e2e8f0; color:#0a1f44; font-weight:700;">🔔 Notifications</a>
        </nav>
    </aside>

    <!-- 2. IDENTICAL MAIN CONTENT REGION FRAME -->
    <main class="portal-main">
        <header class="portal-header">
            <div class="welcome-text">
                <h1 style="margin: 0; color: #0a1f44; font-weight: 800;">Notifications Hub</h1>
                <p style="margin: 4px 0 0 0; color: #4a5568;" id="company-name-target">Loading account context parameter maps...</p>
            </div>
            <div class="header-actions">
                <button id="mark-all-btn" onclick="clearUnreadAlerts()" class="btn-portal-download" style="background: transparent; border: 1px solid #0a1f44; color: #0a1f44; display: none;">Clear Unread Badges</button>
            </div>
        </header>

        <!-- LIVE ALERT LISTING INJECTION CONTAINER -->
        <div style="max-width: 800px; margin-top: 25px;">
            <div id="notifications-target-box">
                <p style="color:#64748b; font-size:0.9rem;">Assembling historical alert log matrices...</p>
            </div>
        </div>
    </main>

    <script>
        let clientInstance = null;

        window.addEventListener('load', async () => {
            clientInstance = window.supabase.createClient(
                'https://lrbimrlbskjweynxlgas.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU'
            );

            const { data, error } = await clientInstance.auth.getSession();
            if (error || !data.session) { window.location.href = 'index.html'; return; }
            document.getElementById('company-name-target').innerText = data.session.user.email;

            setTimeout(fetchWorkspaceNotificationsList, 300);
        });

        async function fetchWorkspaceNotificationsList() {
            const listContainer = document.getElementById('notifications-target-box');
            const { data: { session } } = await clientInstance.auth.getSession();

            const { data: alerts, error } = await clientInstance
                .from('notifications')
                .select('*')
                .eq('user_id', session.user.id)
                .order('created_at', { ascending: false });

            if (error || !alerts || alerts.length === 0) {
                listContainer.innerHTML = `<div class="portal-card"><p style="color:#64748b; margin:0; font-size:0.9rem;">No operational message history found inside this profile record tracker.</p></div>`;
                return;
            }

            if (alerts.some(a => !a.is_read)) {
                document.getElementById('mark-all-btn').style.display = 'inline-block';
            }

            listContainer.innerHTML = alerts.map(alert => `
                <div class="portal-card" style="margin-bottom: 15px; border-left: 5px solid ${alert.is_read ? '#cbd5e1' : '#10b981'}; padding: 20px; background: #ffffff;">
                    <h3 style="margin: 0 0 6px 0; color: #0a1f44; font-size: 1.05rem; font-weight:700;">
                        ${!alert.is_read ? '<span style="color:#10b981; font-size:0.7rem; margin-right:5px;">●</span>' : ''}${alert.title}
                    </h3>
                    <p style="margin: 0 0 12px 0; color: #4a5568; font-size: 0.92rem; line-height: 1.5;">${alert.message}</p>
                    <span style="font-size: 0.75rem; color: #94a3b8;">Sent on: ${new Date(alert.created_at).toLocaleString()}</span>
                </div>
            `).join('');
        }

        async function clearUnreadAlerts() {
            const { data: { session } } = await clientInstance.auth.getSession();
            await clientInstance.from('notifications').update({ is_read: true }).eq('user_id', session.user.id);
            document.getElementById('mark-all-btn').style.display = 'none';
            fetchWorkspaceNotificationsList();
        }
    </script>
</body>
</html>

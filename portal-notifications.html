<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Notifications Hub | filings4u</title>
    <link rel="stylesheet" href="assets/css/portal-global.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="portal-body">
    <!-- SIDEBAR -->
    <aside class="portal-sidebar">
        <div class="sidebar-header">
            <img src="images/logo.png" alt="filings4u" class="sidebar-logo">
        </div>
        <nav class="sidebar-nav">
            <a href="portal-dashboard.html" class="nav-item"><span>📊</span> Dashboard</a>
            <a href="portal-notifications.html" class="nav-item active" style="background:#e2e8f0; color:#0a1f44; font-weight:700;"><span>🏢</span> Notifications</a>
        </nav>
    </aside>

    <!-- CORE DISPLAY FRAME -->
    <main class="portal-main">
        <div class="content-container">
            <header class="portal-header">
                <div class="welcome-text">
                    <h1>Notifications Hub</h1>
                    <p id="company-name-target" style="color: #4a5568;">Loading account alert maps...</p>
                </div>
                <div class="header-actions">
                    <button id="mark-all-btn" onclick="clearUnreadAlerts()" class="btn-portal-download" style="background: transparent; border: 1px solid #0a1f44; color: #0a1f44; display: none;">Clear Unread Badges</button>
                </div>
            </header>

            <!-- NATIVE ALIGNED RECORD LIST MATRIX CARD -->
            <div class="portal-feature-card" style="margin: 25px 0; width: 100%; box-sizing: border-box;">
                <div class="portal-list-wrapper" style="max-height: none;">
                    <div id="notifications-target-box">
                        <p class="portal-empty-message">Scanning system alert indexes...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let clientInstance = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof supabase === 'undefined') return;

            clientInstance = supabase.createClient(
                'https://lrbimrlbskjweynxlgas.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU'
            );

            const { data, error } = await clientInstance.auth.getSession();
            if (error || !data.session) { window.location.href = 'index.html'; return; }
            document.getElementById('company-name-target').innerText = data.session.user.email;
            
            await fetchWorkspaceNotificationsList();
        });

        async function fetchWorkspaceNotificationsList() {
            const listContainer = document.getElementById('notifications-target-box');
            if (!clientInstance || !listContainer) return;

            try {
                const { data: { session } } = await clientInstance.auth.getSession();
                const { data: alerts, error } = await clientInstance
                    .from('notifications')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .order('created_at', { ascending: false });

                if (error || !alerts || alerts.length === 0) {
                    listContainer.innerHTML = `<p class="portal-empty-message">No active message alert data logged inside current tracking arrays.</p>`;
                    return;
                }

                const markBtn = document.getElementById('mark-all-btn');
                if (markBtn) markBtn.style.display = alerts.some(a => !a.is_read) ? 'inline-block' : 'none';

                listContainer.innerHTML = alerts.map(alert => `
                    <div class="portal-item-row" style="padding: 18px 0; border-bottom: 1px solid #e2e8f0;">
                        <div class="item-txt-container">
                            <h3 style="font-weight: 700; font-size: 0.95rem; color:#0a1f44; margin: 0 0 4px 0;">
                                ${!alert.is_read ? '<span class="unread-indicator-dot"></span>' : ''}${alert.title}
                            </h3>
                            <p style="font-size: 0.85rem; color: #4a5568; margin: 0; line-height: 1.4;">${alert.message}</p>
                            <div class="item-timestamp" style="margin-top: 6px; font-size: 0.75rem; color: #64748b;">Dispatched: ${new Date(alert.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                listContainer.innerHTML = `<p class="portal-empty-message" style="color:#e53e3e;">Error resolving server schema metrics database connection.</p>`;
            }
        }

        async function clearUnreadAlerts() {
            if (!clientInstance) return;
            const { data: { session } } = await clientInstance.auth.getSession();
            await clientInstance.from('notifications').update({ is_read: true }).eq('user_id', session.user.id);
            await fetchWorkspaceNotificationsList();
        }

        function openBillingOrdersModal() {
    const modal = document.getElementById('billing-orders-modal');
    if(modal) { modal.style.display = 'flex'; }
}
function closeBillingOrdersModal() {
    const modal = document.getElementById('billing-orders-modal');
    if(modal) { modal.style.display = 'none'; }
}

    </script>
</body>
</html>

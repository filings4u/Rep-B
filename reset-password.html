<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | filings4u Portal</title>
    <style>
        :root {
            --primary-blue: #0a1f44;
            --white: #ffffff;
            --bg-light: #f8f9fa;
            --border-color: #e2e8f0;
            --text-gray: #4a5568;
            --danger-red: #e53e3e;
            --success-green: #48bb78;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .reset-card {
            width: 100%;
            max-width: 370px;
            background: var(--white);
            padding: 25px 30px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 12px 30px rgba(10,31,68,0.04);
            text-align: center;
            box-sizing: border-box;
        }
        .logo-container {
            margin-bottom: 15px;
            text-align: center;
        }
        .logo-container img {
            height: 38px;
        }
        .reset-card h2 { color: var(--primary-blue); font-size: 1.4rem; margin: 0 0 8px 0; font-weight: 700; }
        .reset-card p { color: var(--text-gray); font-size: 0.85rem; margin-bottom: 20px; line-height: 1.4; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-gray); margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; outline: none; color: var(--primary-blue); }
        .btn-submit { width: 100%; background-color: var(--primary-blue); color: var(--white); border: none; padding: 12px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
        .msg { font-size: 0.8rem; margin-top: 10px; text-align: left; }
        .badge-footer-fixed { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: auto; z-index: 999; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<div class="reset-card">
    <div class="logo-container"><img src="images/logo.png" alt="filings4u logo"></div>
    <h2 id="pageTitle">Reset Password</h2>
    <p id="pageSubtitle">Type your registered email to request an encrypted recovery token.</p>
    
    <form id="requestLinkForm" style="display: block;">
        <div class="form-group">
            <label>Reset Account Email</label>
            <input type="email" id="requestEmail" placeholder="name@company.com" required>
        </div>
        <div id="requestStatus" class="msg"></div>
        <button type="submit" id="requestBtn" class="btn-submit">Send Reset Verification Link →</button>
    </form>

    <form id="updatePasswordForm" style="display: none;">
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
        </div>
        <div id="updateStatus" class="msg"></div>
        <button type="submit" id="updateBtn" class="btn-submit">Update Password →</button>
    </form>
    
    <div style="margin-top: 20px; font-size: 0.8rem; text-align: left;">
        <a href="index.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">← Return to Sign In</a>
    </div>
</div>

<footer class="badge-footer-fixed"> 
    <div style="background: rgba(10, 31, 68, 0.95); border: 1px solid rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 8px; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(10px); width: fit-content; box-shadow: 0 4px 15px rgba(0,0,0,0.1);"> 
        <div style="width: 5px; height: 5px; background: #10b981; border-radius: 50%; box-shadow: 0 0 5px #10b981;"></div> 
        <div style="color: white; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; white-space: nowrap;"> 
            <span style="opacity: 0.7;">SECURE</span> 
            <span style="width: 1px; height: 9px; background: rgba(255,255,255,0.2);"></span> 256-BIT ENCRYPTED 
        </div> 
    </div> 
</footer>

<script>
    let supabaseClient = null;
    const reqForm = document.getElementById('requestLinkForm');
    const updForm = document.getElementById('updatePasswordForm');
    const title = document.getElementById('pageTitle');
    const subtitle = document.getElementById('pageSubtitle');

    window.addEventListener('load', async () => {
        try {
            supabaseClient = window.supabase.createClient(
                'https://lrbimrlbskjweynxlgas.supabase.co',
                'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU'
            );
        } catch (err) { console.error(err); return; }

        const parsedHash = new URLSearchParams(window.location.hash.substring(1));
        if (parsedHash.has('access_token') && parsedHash.get('type') === 'recovery') {
            title.innerText = "Update Password";
            subtitle.innerText = "Please enter your new strong account password below.";
            reqForm.style.display = "none";
            updForm.style.display = "block";
        }
    });

    reqForm.onsubmit = async function(e) {
        e.preventDefault();
        const email = document.getElementById('requestEmail').value;
        const status = document.getElementById('requestStatus');
        const btn = document.getElementById('requestBtn');

        btn.innerText = "Sending Reset Token...";
        btn.disabled = true;

        // Dynamic Redirector Logic: Self-detects whether running on Localhost or Live Production Server
        const TARGET_REDIRECT = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
            ? 'http://127.0.0'
            : window.location.origin + window.location.pathname;

        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { 
            redirectTo: TARGET_REDIRECT, 
        });

        if (error) {
            status.style.color = "var(--danger-red)";
            status.innerText = error.message;
            btn.innerText = "Send Reset Verification Link →";
            btn.disabled = false;
        } else {
            status.style.color = "var(--success-green)";
            status.innerText = "Recovery email successfully sent! Check your inbox.";
        }
    };

    updForm.onsubmit = async function(e) {
        e.preventDefault();
        const password = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const status = document.getElementById('updateStatus');
        const btn = document.getElementById('updateBtn');

        if (password !== confirmPassword) {
            status.style.color = "var(--danger-red)";
            status.innerText = "Passwords do not match.";
            return;
        }

        btn.innerText = "Updating Password...";
        btn.disabled = true;

        const { error } = await supabaseClient.auth.updateUser({ password: password });

        if (error) {
            status.style.color = "var(--danger-red)";
            status.innerText = error.message;
            btn.innerText = "Update Password →";
            btn.disabled = false;
        } else {
            status.style.color = "var(--success-green)";
            status.innerText = "Password updated! Redirecting to login page...";
            setTimeout(() => { window.location.href = 'index.html'; }, 3000);
        }
    };
</script>

</body>
</html>

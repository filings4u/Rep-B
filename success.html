<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed & Onboarding | filings4u</title>
    
    <!-- 🚀 MOBILE BROWSER INTERFACE EMERALD THEME CONTROLLERS -->
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-navbutton-color" content="#10b981">
    <link rel="icon" type="image/png" href="images/fav.png">

    <!-- Production CDN Infrastructure -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --emerald: #10b981; --navy: #0a1f44; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; margin: 0; padding: 40px 20px; color: var(--navy); text-align: center; }
        .success-box { max-width: 550px; margin: 40px auto; background: #ffffff; padding: 40px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 10px 30px rgba(10,31,68,0.02); position: relative; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 1rem; margin-top: 6px; margin-bottom: 20px; outline: none; box-sizing: border-box; font-family: inherit; }
        .input-field:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .btn-register { background: var(--navy); color: white; border: none; width: 100%; padding: 14px; border-radius: 6px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .btn-register:hover { background: var(--emerald); }
        .trust-badge { background: rgba(16, 185, 129, 0.1); padding: 10px 20px; border-radius: 8px; font-size: 0.75rem; color: var(--navy); font-weight: 600; display: inline-flex; align-items: center; gap: 8px; margin-top: 25px; }
        .trust-badge span { color: var(--emerald); font-weight: 800; }
    </style>
</head>
<body>

    <div class="success-box">
        <!-- ⏰ LIVE SYSTEM DATE/TIME INFRASTRUCTURE (TOP RIGHT CORNER) -->
        <div style="position: absolute; top: 15px; right: 25px; text-align: right;">
            <div id="live-success-date" style="font-size: 0.65rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px;">--/--/----</div>
            <div id="live-success-clock" style="font-family: monospace; font-size: 0.85rem; font-weight: 800; color: var(--emerald);">00:00:00</div>
        </div>

        <!-- Checkmark Graphic Identifier Accent -->
        <div style="width: 64px; height: 64px; background: rgba(16,185,129,0.1); color: var(--emerald); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 10px auto 20px auto;">✓</div>
        
        <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; color: var(--navy);">Filing Order Confirmed!</h1>
        <p style="color: #64748b; font-size: 0.95rem; line-height: 1.5; margin-bottom: 30px;">Your government application parameters have been generated and cached inside our review terminal queues. Type a secure login password below to claim your database space tracking logs.</p>

        <!-- CREDENTIAL CONFIGURATION REGISTRATION MATRIX -->
        <div style="text-align: left;">
            <label style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #4a5568; letter-spacing: 0.5px;">Verified Account Email Address</label>
            <input type="text" id="display-user-email" class="input-field" style="background: #f8fafc; color: #64748b; cursor: not-allowed;" readonly>

            <label style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #4a5568; letter-spacing: 0.5px;">Create Secure Account Password</label>
            <input type="password" id="register-password" class="input-field" placeholder="Minimum 6 characters required" required>

            <button onclick="executeSecureUserRegistration()" class="btn-register">Activate Dashboard Access ➔</button>
        </div>
        
        <p id="registration-feedback-msg" style="margin-top: 15px; font-size: 0.88rem; font-weight: 600; text-align: center; min-height: 20px;"></p>

        <!-- SECURE SYSTEM BOUNDARY ACCENT -->
        <div class="trust-badge">
            <span>SECURE</span> 256-bit SSL Encrypted Connection
        </div>
    </div>

    <script>
        // --- 1. RUNNING DIAL CLOCK LOG ENGINE ---
        (function() {
            function updateSuccessClock() {
                const clockBox = document.getElementById('live-success-clock');
                const dateBox = document.getElementById('live-success-date');
                const now = new Date();
                if (clockBox) clockBox.innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                if (dateBox) dateBox.innerText = now.toLocaleDateString([], { month: 'short', day: '2-digit', year: 'numeric' });
            }
            updateSuccessClock();
            setInterval(updateSuccessClock, 1000);
        })();

        // --- 2. INITIALIZE CONNECTED MASTER AUTH INSTANCE PROFILE ---
        window.portalSupabaseInstance = supabase.createClient(
            'https://lrbimrlbskjweynxlgas.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyYmltcmxic2tqd2V5bnhsZ2FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjQ0NTYsImV4cCI6MjA5NDEwMDQ1Nn0.I8fQ6ZjA9oaTqJCF-7Z7vUboXC8zv2cogBv4PC_1ihU'
        );

        // Parse query parameter records from incoming URL string mapping loops
        const urlParams = new URLSearchParams(window.location.search);
        const resolvedEmail = urlParams.get('email') || '';

        if (resolvedEmail) {
            document.getElementById('display-user-email').value = decodeURIComponent(resolvedEmail);
        } else {
            // Check memory backup cache if email is missing from URL query string
            const memoryCache = sessionStorage.getItem('pendingOrder');
            if (memoryCache) {
                document.getElementById('display-user-email').value = JSON.parse(memoryCache).customer_email;
            } else {
                document.getElementById('display-user-email').value = 'guest-checkout@filings4u.com';
            }
        }

        /**
 * Create user credentials inside Supabase Auth and link operational data logs
 */
async function executeSecureUserRegistration() {
    const emailInput = document.getElementById('display-user-email').value.trim().toLowerCase();
    const passwordInput = document.getElementById('register-password').value.trim();
    const feedbackBox = document.getElementById('registration-feedback-msg');

    if (passwordInput.length < 8) {
        feedbackBox.style.color = '#e53e3e';
        feedbackBox.innerText = "Security check failed: Password must contain at least 8 characters.";
        return;
    }

    // 🛡️ SECURITY GATEWAY POLICY: Determine destination workspace paths based on email extension
    const isInternalStaffMember = emailInput.endsWith('@filings4u.com');
    let dynamicTargetRedirectPath = 'portal-dashboard.html'; // Default secure customer terminal hub

    if (isInternalStaffMember) {
        // If the email belongs to corporate staff, redirect to the internal admin portal workspace
        dynamicTargetRedirectPath = 'admin-dashboard.html';
        feedbackBox.style.color = 'var(--emerald)';
        feedbackBox.innerText = "Internal staff member recognized. Provisioning directory access channels...";
    } else {
        feedbackBox.style.color = 'var(--navy)';
        feedbackBox.innerText = "Registering customer profile and syncing compliance files...";
    }

    try {
        // 🚀 SUPABASE AUTH SIGN-UP INSTANTIATION
        const { data, error } = await window.portalSupabaseInstance.auth.signUp({
            email: emailInput,
            password: passwordInput
        });

        if (error) throw error;

        // Sync captured sessionStorage form dataset parameters into database rows
        const rawOrderCache = sessionStorage.getItem('pendingOrder');
        if (rawOrderCache && data.user) {
            const parsedOrder = JSON.parse(rawOrderCache);
            const signedContractText = sessionStorage.getItem('compiledLegalPoaTextString') || '';
            
            // Insert the rich payload data bundle directly into your orders table
            await window.portalSupabaseInstance
                .from('orders')
                .insert([{
                    user_id: data.user.id,
                    company_name: parsedOrder.company_name,
                    service_plan: parsedOrder.plan,
                    price_paid: parsedOrder.price,
                    government_metadata_payload: parsedOrder.metadata,
                    signed_poa_document_text: signedContractText,
                    is_staff_file: isInternalStaffMember // Tracks file roles for system auditing matrices
                }]);
                
            sessionStorage.removeItem('pendingOrder'); // Wipe storage to maintain clean states
            sessionStorage.removeItem('compiledLegalPoaTextString');
        }

        feedbackBox.style.color = 'var(--emerald)';
        feedbackBox.innerText = `Account activated successfully! Logging into Client Portal...`;
        
        // Launch the appropriate verified endpoint path context dynamically
        setTimeout(() => {
            window.location.href = dynamicTargetRedirectPath;
        }, 2200);

    } catch (err) {
        console.error("Critical onboarding transaction break exception caught:", err);
        feedbackBox.style.color = '#e53e3e';
        feedbackBox.innerText = `Activation failure configuration profile error: ${err.message}`;
    }
}

    </script>
</body>
</html>

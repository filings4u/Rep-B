<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Update Password | filings4u</title>

    <!-- 🎨 STYLESHEET CHANNELS -->
    <link rel="stylesheet" href="assets/css/portal-global.css">
    <link rel="stylesheet" href="assets/css/responsive.css"> <!-- Linked cleanly here -->

    <!-- 🚀 JAVASCRIPT ARCHITECTURE PIPELINES -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/wizard-sync.js"></script> <!-- Linked cleanly here -->

    <style>
        /* 🚨 RED GLOW ERROR SHADOW FOR MISMATCHED/MISSING FIELDS */
        .form-group input.field-error {
            border-color: #e53e3e !important;
            box-shadow: 0 0 0 4px rgba(229, 62, 62, 0.15) !important;
            animation: formShake 0.4s ease-in-out;
        }

        @keyframes formShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .toggle-password-btn {
            position: absolute; right: 12px; background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 4px; display: flex; align-items: center; justify-content: center; color: #64748b; user-select: none;
        }
    </style>
</head>
<body style="background: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div class="login-card" style="width: 100%; max-width: 400px; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; box-shadow: 0 20px 40px rgba(10,31,68,0.06);">
        <div class="logo-container" style="margin-bottom: 15px;"><img src="images/logo.png" alt="filings4u logo" style="height: 38px;"></div>
        <h2>Establish New Password</h2>
        <p style="color: #44526c; font-size: 0.85rem; margin-bottom: 25px;">Your recovery token is verified. Please input and confirm your new secret password key.</p>
        
        <form id="updatePasswordForm" novalidate>
            <!-- 🔑 PASSWORD FIELD 1 -->
            <div class="form-group" style="text-align: left; margin-bottom: 16px;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #0a1f44; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;">New Secure Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="newPassword" required style="width: 100%; padding: 12px; padding-right: 45px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; outline: none;" placeholder="••••••••">
                    <button type="button" class="toggle-password-btn" data-target="newPassword">👁️</button>
                </div>
            </div>

            <!-- 🔑 PASSWORD FIELD 2 -->
            <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #0a1f44; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;">Confirm New Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="confirmPassword" required style="width: 100%; padding: 12px; padding-right: 45px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.9rem; outline: none;" placeholder="••••••••">
                    <button type="button" class="toggle-password-btn" data-target="confirmPassword">👁️</button>
                </div>
                <div id="update-error" style="color: #c15254; font-size: 0.8rem; margin-top: 8px; font-weight: 600; text-align: left; min-height: 1.2em;"></div>
            </div>

            <button type="submit" class="btn-login" id="submitBtn" style="width: 100%; background: #10b981; color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: background-color 0.2s;">Update Token Key ✓</button>
        </form>
    </div>

    <script>
        // 1. Password Visibility Toggle Engine
        document.querySelectorAll('.toggle-password-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = button.getAttribute('data-target');
                const inputField = document.getElementById(targetId);
                if (inputField.type === 'password') {
                    inputField.type = 'text';
                    button.innerText = '🙈';
                } else {
                    inputField.type = 'password';
                    button.innerText = '👁️';
                }
            });
        });

        // 2. Client Assembly Submission Gate
        document.getElementById('updatePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const errBox = document.getElementById('update-error');
            const submitBtn = document.getElementById('submitBtn');

            // Reset UI validation states
            newPasswordInput.classList.remove('field-error');
            confirmPasswordInput.classList.remove('field-error');
            errBox.innerText = "";

            const passValue = newPasswordInput.value;
            const confirmValue = confirmPasswordInput.value;

            let hasFormErrors = false;
            if (!passValue) { newPasswordInput.classList.add('field-error'); hasFormErrors = true; }
            if (!confirmValue) { confirmPasswordInput.classList.add('field-error'); hasFormErrors = true; }
            if (hasFormErrors) {
                errBox.innerText = "Please complete all password input fields.";
                return;
            }

            if (passValue.length < 6) {
                newPasswordInput.classList.add('field-error');
                errBox.innerText = "Security requirement failed: Password must be at least 6 characters long.";
                return;
            }

            if (passValue !== confirmValue) {
                newPasswordInput.classList.add('field-error');
                confirmPasswordInput.classList.add('field-error');
                errBox.innerText = "Sync Denied: Input parameters do not match. Please review your entries.";
                return;
            }

            submitBtn.innerText = "Synchronizing Token...";
            submitBtn.disabled = true;

            // 🎯 FIXED: Async polling engine waiting safely for config client instantiation
            function waitForSupabaseClientEngine() {
                return new Promise((resolve) => {
                    if (window.supabaseClient) return resolve(window.supabaseClient);
                    const trackingInterval = setInterval(() => {
                        if (window.supabaseClient) {
                            clearInterval(trackingInterval);
                            resolve(window.supabaseClient);
                        }
                    }, 30);
                });
            }

            const client = await waitForSupabaseClientEngine();

            try {
                const { error } = await client.auth.updateUser({ password: passValue });
                if (error) throw error;

                alert("Password fully synchronized successfully! Routing to terminal workspace...");
                
                // 🎯 FIXED: Direct path via absolute URL anchor assignment to drop relative paths
                window.location.assign(`${window.productionRootUrl}/portal-login.html`);
            } catch(err) {
                newPasswordInput.classList.add('field-error');
                confirmPasswordInput.classList.add('field-error');
                errBox.innerText = `Sync Failed: ${err.message}`;
                submitBtn.innerText = "Update Token Key ✓";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

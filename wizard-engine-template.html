  <style>
    :root {
      --brand-navy: #0f172a;
      --brand-emerald: #10b981;
      --bg-slate: #f8fafc;
      --border-gray: #e2e8f0;
      --text-dark: #334155;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
      background: var(--bg-slate);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
      box-sizing: border-box;
    }

    .wizard-card-wrapper {
      background: #ffffff;
      width: 100%;
      max-width: 950px;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(15,23,42,0.15);
      border: 1px solid var(--border-gray);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin: 20px auto;
      min-height: 650px;
      box-sizing: border-box;
      position: relative;
    }

    .wizard-field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .wizard-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .wizard-input, .wizard-select {
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.95rem;
      width: 100%;
      box-sizing: border-box;
      transition: border 0.15s;
    }

    .wizard-input:focus, .wizard-select:focus {
      border-color: var(--brand-emerald);
      outline: none;
    }

    .upsell-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      width: 100%;
    }

    @media (min-width: 600px) {
      .upsell-grid { grid-template-columns: 1fr 1fr; }
    }

    .upsell-card {
      border: 2px dashed #cbd5e1;
      background: #ffffff;
      padding: 16px;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all 0.2s;
      position: relative;
    }

    .upsell-card:hover {
      border-color: var(--brand-emerald);
    }

    .upsell-checkbox {
      width: 18px;
      height: 18px;
      margin-top: 3px;
      cursor: pointer;
      accent-color: var(--brand-emerald);
    }

    .summary-box {
      background: var(--bg-slate);
      border: 1px solid var(--border-gray);
      border-radius: 8px;
      padding: 20px;
      text-align: left;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border-gray);
      font-size: 0.95rem;
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    #stripe-card-element {
      background: white;
      padding: 16px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      min-height: 48px;
    }

    .signature-input-font {
      font-family: 'Brush Script MT', 'Bickham Script Pro', 'Gabriola', cursive;
      font-size: 1.65rem !important;
      color: #1e3a8a !important;
      letter-spacing: 1px;
      padding: 10px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      width: 100%;
      box-sizing: border-box;
    }

    .wizard-helper-text {
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
      line-height: 1.4;
      margin-top: 4px;
      display: block;
    }

    .crm-btn {
      transition: all 0.15s ease-in-out;
      user-select: none;
    }

    .crm-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .crm-btn:active {
      transform: translateY(0);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
  </style>
</head>

    // ⏱️ REAL-TIME MATRIX SYSTEM PORTAL CLOCK
    function initializePremiumWizardClock() {
      var cb = document.getElementById("wizard-portal-clock");
      if (!cb) return;
      setInterval(function() {
        var n = new Date();
        var d = String(n.getDate()).padStart(2, '0');
        var m = String(n.getMonth() + 1).padStart(2, '0');
        var y = n.getFullYear();
        var hr = n.getHours();
        var ampm = hr >= 12 ? 'PM' : 'AM';
        hr = hr % 12;
        hr = hr ? hr : 12;
        var hrs = String(hr).padStart(2, '0');
        var mins = String(n.getMinutes()).padStart(2, '0');
        var secs = String(n.getSeconds()).padStart(2, '0');
        cb.textContent = m + "/" + d + "/" + y + " | " + hrs + ":" + mins + ":" + secs + " " + ampm;
      }, 1000);
    }

    // 🚀 MAIN APPLICATION ENGINE INITIALIZATION SYSTEM

      var speedAnchor = document.getElementById("wizardSpeedDurationAnchor");
      if (speedAnchor) {

      synchronizeWizardStepUILayout();
    });

    function toggleCustomSupportChatDrawer() {

      } else {

        var step1Name = document.getElementById("wiz_client_firstname");
        var step1Email = document.getElementById("wiz_client_email");
        var chatName = document.getElementById("chat_user_name");
        var chatEmail = document.getElementById("chat_user_email");

        if (step1Name && step1Name.value.trim() && chatName && !chatName.value) {
          var step1Last = document.getElementById("wiz_client_lastname");
          chatName.value = step1Name.value.trim() + " " + (step1Last ? step1Last.value.trim() : "");
        }
        if (step1Email && step1Email.value.trim() && chatEmail && !chatEmail.value) {
          chatEmail.value = step1Email.value.trim();
        }
      }
    }

    // 🚀 VERIFICATION ROUTING CONTROLLER
    function handleSupportChatVerification(event) {
      event.preventDefault();
      var nameEl = document.getElementById("chat_user_name");
      var emailEl = document.getElementById("chat_user_email");
      var workspace = document.getElementById("wizChatWorkspaceBox");

      if (!nameEl || !emailEl || !workspace) return;
      var clientName = nameEl.value.trim();
      var clientEmail = emailEl.value.trim();
      if (!clientName || !clientEmail) return;

      renderActiveSupportChatInterface(clientName);
    }

    // 🎨 RENDER OPERATIONAL LIVE CHAT INTERFACE WINDOW
    function renderActiveSupportChatInterface(verifiedName) {
      var workspace = document.getElementById("wizChatWorkspaceBox");
      if (!workspace) return;

      workspace.innerHTML = 
        '<div style="flex:1; display:flex; flex-direction:column; justify-content:space-between; height:100%; box-sizing:border-box;">' +
          '<div id="chatMessageHistoryContainer" style="flex:1; display:flex; flex-direction:column; gap:12px; overflow-y:auto; padding-bottom:15px;">' +
            '<div style="align-self:flex-start; background:#e2e8f0; color:var(--brand-navy); padding:10px 14px; border-radius:12px 12px 12px 0; max-width:85%; font-size:0.85rem; font-weight:500; line-height:1.4;">' +

            '<button type="button" style="background:var(--brand-navy); color:#fff; border:0; padding:0 14px; border-radius:6px; font-weight:700; font-size:0.85rem; cursor:pointer;" onclick="transmitChatMessageFromTerminal()">Send</button>' +
          '</div>' +
        '</div>';
    }

    // 📨 TRANSMIT CUSTOMER TERMINAL MESSAGES
    function transmitChatMessageFromTerminal() {
      var msgInput = document.getElementById("chatTerminalMessageInput");
      var history = document.getElementById("chatMessageHistoryContainer");
      if (!msgInput || !msgInput.value.trim() || !history) return;

      var userText = msgInput.value.trim();
      msgInput.value = "";

      var userBubble = document.createElement("div");
      userBubble.style.cssText = "align-self:flex-end; background:var(--brand-emerald); color:#fff; padding:10px 14px; border-radius:12px 12px 0 12px; max-width:85%; font-size:0.85rem; font-weight:600; line-height:1.4; word-break:break-word;";
      userBubble.textContent = userText;
      
      history.appendChild(userBubble);
      history.scrollTop = history.scrollHeight;
    }

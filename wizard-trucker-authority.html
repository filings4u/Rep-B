<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trucker Authority (MC#) Wizard | filings4u</title>
    <link rel="stylesheet" href="assets/css/portal-wizard.css">
   
</head>
<body style="background: var(--ice);">

<nav style="background: white; padding: 15px 8%; border-bottom: 1px solid var(--border);">
    <img src="images/logo.png" style="height: 30px;">
</nav>

<!-- TRUCKER AUTHORITY WIZARD CONTENT -->
<main class="portal-main">
    <div class="content-container">
        <header class="portal-header">
            <div class="welcome-text">
                <h1>Motor Authority Registration</h1>
                <p>Registering with the <strong>FMCSA</strong></p>
            </div>
            <!-- Progress Bar -->
            <div class="wizard-progress" style="width: 100%; max-width: 400px; background: #edf2f7; height: 8px; border-radius: 10px; margin-top: 10px;">
                <div id="progress-fill" style="background: var(--primary-blue); height: 100%; width: 20%; border-radius: 10px; transition: 0.3s;"></div>
            </div>
        </header>

        <div class="portal-card" id="wizard-step-container">
            <form id="authority-wizard" action="order.html">
                <!-- STEP 1: BUSINESS INFO -->
                <section class="step" id="step-1">
                    <h3>Step 1: Business Identity</h3>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>Legal Business Name (Must match IRS)</label>
                        <input type="text" class="search-input" style="width: 100%; border: 1px solid #ddd;" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label>EIN or SSN</label>
                        <input type="text" class="search-input" style="width: 100%; border: 1px solid #ddd;" placeholder="XX-XXXXXXX" required>
                    </div>
                    <button type="button" class="btn-primary-small" onclick="nextStep(2)">Continue</button>
                </section>

                <!-- STEP 2: OPERATION CLASSIFICATION (MCS-150) -->
                <section class="step" id="step-2" style="display:none;">
                    <h3>Step 2: Operation Details</h3>
                    <p>Select your primary business operation:</p>
                    <label style="display:block; margin-bottom: 10px;">
                        <input type="radio" name="op_type" value="carrier"> Motor Carrier (Property)
                    </label>
                    <label style="display:block; margin-bottom: 10px;">
                        <input type="radio" name="op_type" value="broker"> Broker
                    </label>
                    <button type="button" class="btn-primary-small" style="background: #a0aec0;" onclick="nextStep(1)">Back</button>
                    <button type="button" class="btn-primary-small" onclick="nextStep(3)">Continue</button>
                </section>

                <!-- FINAL STEP: READY FOR PAYMENT -->
                <section class="step" id="step-3" style="display:none;">
                    <h3>Final Review</h3>
                    <p>Everything looks good. Proceed to secure payment to file your MC Authority.</p>
                    <button type="submit" class="btn-primary-small">Proceed to Order ($300.00)</button>
                </section>
            </form>
        </div>
    </div>
</main>

<script>
function nextStep(step) {
    document.querySelectorAll('.step').forEach(s => s.style.display = 'none');
    document.getElementById('step-' + step).style.display = 'block';
    const progress = (step / 3) * 100;
    document.getElementById('progress-fill').style.width = progress + '%';
}
</script>

</body>
</html>
